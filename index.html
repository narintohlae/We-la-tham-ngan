<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Time Tracking</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --primary: #0f172a;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --error: #ef4444;
        }

        body { 
            font-family: 'Inter', sans-serif; background-color: var(--bg); 
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .container { width: 100%; max-width: 400px; padding: 20px; }

        /* การจัดการหน้าจอ (Hidden by default) */
        .page { display: none; background: var(--card); padding: 32px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .page.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 1.25rem; font-weight: 600; text-align: center; margin-bottom: 8px; }
        .subtitle { color: var(--text-sub); font-size: 0.85rem; text-align: center; margin-bottom: 24px; }

        .input-field {
            width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border);
            border-radius: 8px; font-size: 1rem; text-align: center; background: #fdfdfd;
        }

        .btn {
            width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: 600;
            cursor: pointer; font-size: 0.9rem; transition: 0.2s;
        }
        .btn-main { background: var(--primary); color: white; }
        .btn-main:hover { opacity: 0.9; }
        .btn-ghost { background: transparent; color: var(--text-sub); margin-top: 12px; }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .action-btn { 
            background: white; border: 1px solid var(--border); padding: 15px 10px; 
            border-radius: 12px; font-size: 0.8rem; font-weight: 600;
        }
        .action-btn:hover { background: #f8fafc; border-color: var(--primary); }

        .status-badge {
            display: inline-block; padding: 4px 12px; border-radius: 20px; 
            font-size: 0.75rem; font-weight: 600; margin-bottom: 16px;
        }

        .footer-links { text-align: center; margin-top: 24px; }
        .link { font-size: 0.75rem; color: var(--text-sub); cursor: pointer; text-decoration: underline; background: none; border: none; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="page-login" class="page active">
        <h1>Welcome Back</h1>
        <p class="subtitle">กรุณาระบุรหัสผ่านเพื่อเข้าใช้งาน</p>
        <input type="password" id="login-pin" class="input-field" placeholder="Enter 4-digit PIN" maxlength="4">
        <button class="btn btn-main" onclick="handleLogin()">Login</button>
        <div class="footer-links" style="margin-top: 40px;">
            <button class="link" onclick="exportToExcel()">Export Admin Report</button>
        </div>
    </div>

    <div id="page-dashboard" class="page">
        <div id="user-header">
            <h1 id="welcome-text">User Dashboard</h1>
            <p class="subtitle" id="date-text"></p>
        </div>

        <div class="action-grid">
            <button class="action-btn" onclick="record('เข้างาน')" style="color: var(--success)">Check In</button>
            <button class="action-btn" onclick="record('ออกงาน')" style="color: var(--error)">Check Out</button>
            <button class="action-btn" onclick="record('โอที')" style="color: #6366f1">Overtime</button>
            <button class="action-btn" onclick="record('ลา')" style="color: #f59e0b">Leave</button>
        </div>

        <button class="btn btn-ghost" onclick="logout()">Sign Out</button>
    </div>

</div>

<script>
    const users = {
        "1234": "Jantra",
        "5678": "Panwasa"
    };

    let currentUser = null;

    function handleLogin() {
        const pin = document.getElementById('login-pin').value;
        if (users[pin]) {
            currentUser = users[pin];
            showPage('page-dashboard');
            document.getElementById('welcome-text').innerText = `Hello, ${currentUser}`;
            document.getElementById('date-text').innerText = new Date().toLocaleDateString('th-TH', { 
                day: 'numeric', month: 'long', year: 'numeric' 
            });
            document.getElementById('login-pin').value = '';
        } else {
            alert('รหัสผ่านไม่ถูกต้อง');
            document.getElementById('login-pin').value = '';
        }
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    function record(type) {
        let note = "-";
        if (type === 'ลา') note = prompt("ระบุสาเหตุการลา:") || "ไม่ระบุเหตุผล";
        if (type === 'โอที') note = confirm("กด OK เพื่อเริ่มโอที / Cancel เพื่อจบโอที") ? "เริ่มโอที" : "จบโอที";

        const now = new Date();
        const entry = {
            Name: currentUser,
            Type: type,
            Date: now.toLocaleDateString('th-TH'),
            Time: now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }),
            Note: note
        };

        const logs = JSON.parse(localStorage.getItem('secureStaffLogs')) || [];
        logs.unshift(entry);
        localStorage.setItem('secureStaffLogs', JSON.stringify(logs));
        
        alert(`บันทึก ${type} สำเร็จ`);
        logout(); // บันทึกเสร็จแล้วล็อกเอาท์อัตโนมัติเพื่อความปลอดภัย
    }

    function logout() {
        currentUser = null;
        showPage('page-login');
    }

    function exportToExcel() {
        const adminPin = prompt("Enter Admin PIN to Export (1234):");
        if(adminPin !== "1234") return alert("Unauthorized");

        const logs = JSON.parse(localStorage.getItem('secureStaffLogs')) || [];
        if (!logs.length) return alert('ไม่มีข้อมูล');
        
        const ws = XLSX.utils.json_to_sheet(logs);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "StaffLogs");
        XLSX.writeFile(wb, "Staff_Attendance_Report.xlsx");
    }
</script>

</body>
</html>
