<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTime Ultra - Next Gen</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #6366f1; --accent-light: #818cf8; --bg: #0f172a; --surface: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1); --text-primary: #f8fafc; --text-secondary: #94a3b8;
            --success: #10b981; --danger: #f43f5e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at top right, #1e293b, #0f172a);
            margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; color: var(--text-primary);
        }

        .container { width: 100%; max-width: 440px; padding: 20px; }

        .glass-card {
            background: var(--surface); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 40px; padding: 35px 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); display: none;
        }
        .glass-card.active { display: block; animation: zoomIn 0.5s forwards; }

        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* Clock & Header */
        .live-clock { font-size: 3rem; font-weight: 800; text-align: center; letter-spacing: -2px; margin-bottom: 5px; background: linear-gradient(to bottom, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .live-date { text-align: center; color: var(--accent-light); font-size: 0.9rem; font-weight: 600; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }

        /* Inputs */
        .pin-input {
            width: 100%; background: rgba(0,0,0,0.2); border: 2px solid var(--glass-border); padding: 20px;
            border-radius: 20px; color: #fff; font-size: 1.5rem; text-align: center; outline: none; margin-bottom: 20px;
        }
        .pin-input:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); }

        /* Action Buttons */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .action-node {
            background: var(--surface); border: 1px solid var(--glass-border); border-radius: 28px;
            padding: 25px 15px; display: flex; flex-direction: column; align-items: center; cursor: pointer;
        }
        .action-node:hover:not(:disabled) { background: rgba(255,255,255,0.1); transform: translateY(-5px); border-color: var(--accent); }
        .action-node:active { transform: scale(0.95); }
        .action-node:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }
        .icon-circle { width: 50px; height: 50px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 12px; }

        /* History & Status */
        .status-badge { background: rgba(99, 102, 241, 0.1); color: var(--accent-light); padding: 8px 15px; border-radius: 12px; font-size: 0.8rem; font-weight: 700; display: inline-block; margin-bottom: 20px; }
        .history-item { 
            display: flex; align-items: center; background: rgba(255,255,255,0.03); 
            padding: 15px; border-radius: 18px; margin-bottom: 10px; border-left: 4px solid var(--glass-border);
        }
        .history-item.in { border-left-color: var(--success); }
        .history-item.out { border-left-color: var(--danger); }

        /* Admin Layout */
        .admin-stat { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-box { flex: 1; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid var(--glass-border); }
        .stat-val { font-size: 1.5rem; font-weight: 800; color: var(--accent-light); }
        .search-admin { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 12px 20px; border-radius: 15px; color: #fff; margin-bottom: 15px; }

        .btn-pro { width: 100%; padding: 18px; border-radius: 20px; border: none; font-weight: 700; cursor: pointer; font-family: inherit; }
        .btn-indigo { background: var(--accent); color: #fff; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
        .logout-btn { background: none; border: none; color: var(--text-secondary); width: 100%; margin-top: 20px; cursor: pointer; font-size: 0.8rem; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <div id="page-login" class="glass-card active">
        <div class="live-clock" id="login-clock">00:00</div>
        <div class="live-date" id="login-date">...</div>
        <h1 style="margin-bottom:10px">Secure Access</h1>
        <p style="text-align:center; color:var(--text-secondary); margin-bottom:30px">ระบุ PIN ของคุณเพื่อเริ่มต้นวันใหม่</p>
        <input type="password" id="login-pin" class="pin-input" placeholder="••••" maxlength="4" inputmode="numeric">
        <button class="btn-pro btn-indigo" onclick="handleLogin()">Sign In</button>
    </div>

    <div id="page-dashboard" class="glass-card">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:25px">
            <div>
                <div id="greeting-text" style="color:var(--text-secondary); font-size:0.9rem">Good Morning</div>
                <h2 id="welcome-text" style="margin:5px 0 0 0; font-size:1.6rem">User Name</h2>
            </div>
            <div id="status-tag" class="status-badge">ONLINE</div>
        </div>

        <div class="btn-grid">
            <button id="btn-in" class="action-node" onclick="record('เข้างาน')">
                <div class="icon-circle" style="background:rgba(16,185,129,0.1); color:var(--success)">🎯</div>
                <span style="font-weight:700">Check In</span>
            </button>
            <button id="btn-out" class="action-node" onclick="record('ออกงาน')">
                <div class="icon-circle" style="background:rgba(244,63,94,0.1); color:var(--danger)">🏁</div>
                <span style="font-weight:700">Check Out</span>
            </button>
        </div>
        <button class="btn-pro" style="background:rgba(255,255,255,0.05); color:#fff; border:1px solid var(--glass-border)" onclick="record('ลา')">🌴 แจ้งลาหยุด</button>

        <div style="margin-top:30px">
            <h3 style="font-size:1rem; margin-bottom:15px">Recent Logs</h3>
            <div id="history-stack"></div>
        </div>
        <button class="logout-btn" onclick="logout()">Logout Account</button>
    </div>

    <div id="page-admin" class="glass-card">
        <h2 style="margin-top:0">Operations Hub</h2>
        <div class="admin-stat">
            <div class="stat-box"><div>Active</div><div id="stat-active" class="stat-val">0</div></div>
            <div class="stat-box"><div>Leave</div><div id="stat-leave" class="stat-val">0</div></div>
        </div>
        <input type="text" id="admin-search" class="search-admin" placeholder="Search employee..." onkeyup="filterAdmin()">
        <div id="admin-monitor" style="max-height:300px; overflow-y:auto; margin-bottom:20px"></div>
        <button class="btn-pro btn-indigo" onclick="exportFromFirestore()">📊 Export Monthly Report</button>
        <button class="logout-btn" onclick="logout()">Back to Portal</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD-RzkBZ3lXFodonqoMFIrpuCwQ4JPr71g",
        authDomain: "we-la-tham-ngan.firebaseapp.com",
        projectId: "we-la-tham-ngan",
        storageBucket: "we-la-tham-ngan.firebasestorage.app",
        messagingSenderId: "321115203647",
        appId: "1:321115203647:web:9d8d11ed78c4e949e3b08a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const USERS = { "1234": "Jantra", "5678": "Panwasa", "9999": "Admin" };
    let currentUser = null;
    let adminListener = null;

    // ระบบนาฬิกา & ทักทาย
    function updateClock() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });
        const dateStr = now.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric', month: 'short' });
        
        document.getElementById('login-clock').innerText = timeStr;
        document.getElementById('login-date').innerText = dateStr;

        const hour = now.getHours();
        let greet = "Good Evening";
        if(hour < 12) greet = "Good Morning";
        else if(hour < 17) greet = "Good Afternoon";
        if(document.getElementById('greeting-text')) document.getElementById('greeting-text').innerText = greet;
    }
    setInterval(updateClock, 1000);
    updateClock();

    window.onload = () => {
        const saved = localStorage.getItem('activeUser');
        if(saved) { currentUser = saved; entryPoint(); }
    };

    function handleLogin() {
        const pin = document.getElementById('login-pin').value;
        if(USERS[pin]) {
            currentUser = USERS[pin];
            localStorage.setItem('activeUser', currentUser);
            entryPoint();
        } else { alert("Invalid PIN"); }
    }

    function entryPoint() {
        if(currentUser === 'Admin') { showPage('page-admin'); initAdmin(); }
        else { showPage('page-dashboard'); initStaff(); }
    }

    async function initStaff() {
        document.getElementById('welcome-text').innerText = currentUser;
        const snap = await db.collection("attendance_logs").where("name", "==", currentUser).orderBy("timestamp", "desc").limit(5).get();
        
        const historyStack = document.getElementById('history-stack');
        let html = '';
        if(!snap.empty) {
            const lastType = snap.docs[0].data().type;
            document.getElementById('status-tag').innerText = lastType === 'เข้างาน' ? 'WORKING' : 'OFF DUTY';
            document.getElementById('btn-in').disabled = (lastType === 'เข้างาน');
            document.getElementById('btn-out').disabled = (lastType !== 'เข้างาน');

            snap.forEach(doc => {
                const d = doc.data();
                const typeClass = d.type === 'เข้างาน' ? 'in' : 'out';
                html += `<div class="history-item ${typeClass}">
                    <div style="flex:1"><b>${d.type}</b><br><small style="color:var(--text-secondary)">${d.date}</small></div>
                    <div style="font-weight:800">${d.time}</div>
                </div>`;
            });
        }
        historyStack.innerHTML = html || '<p style="text-align:center; color:var(--text-secondary)">No recent logs</p>';
    }

    function initAdmin() {
        const today = new Date().toLocaleDateString('th-TH');
        adminListener = db.collection("attendance_logs").orderBy("timestamp", "desc").limit(20).onSnapshot(snap => {
            const mon = document.getElementById('admin-monitor');
            let html = '';
            let active = new Set();
            let leave = 0;
            
            snap.forEach(doc => {
                const d = doc.data();
                if(d.date === today) {
                    if(d.type === 'เข้างาน') active.add(d.name);
                    if(d.type === 'ลา') leave++;
                }
                html += `<div class="history-item" style="border-left:none; background:rgba(255,255,255,0.02)">
                    <div style="flex:1"><b>${d.name}</b><br><small>${d.type}</small></div>
                    <div style="text-align:right"><b>${d.time}</b><br><small>${d.date}</small></div>
                </div>`;
            });
            mon.innerHTML = html;
            document.getElementById('stat-active').innerText = active.size;
            document.getElementById('stat-leave').innerText = leave;
        });
    }

    function record(type) {
        const entry = {
            name: currentUser, type: type, 
            date: new Date().toLocaleDateString('th-TH'),
            time: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }),
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };
        db.collection("attendance_logs").add(entry).then(() => {
            if(currentUser !== 'Admin') initStaff();
        });
    }

    function logout() {
        if(adminListener) adminListener();
        localStorage.clear();
        location.reload();
    }

    function showPage(id) {
        document.querySelectorAll('.glass-card').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function exportFromFirestore() {
        db.collection("attendance_logs").orderBy("timestamp", "desc").get().then(qs => {
            const data = qs.docs.map(d => d.data());
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Logs");
            XLSX.writeFile(wb, "UltraPro_Report.xlsx");
        });
    }
</script>
</body>
</html>
