<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Log: Jantra & Panwasa</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --warning: #f59e0b;
            --ot: #8b5cf6;
            --excel: #1d6f42; /* สีเขียว Excel */
            --bg: #f1f5f9;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { text-align: center; color: #1e293b; margin-bottom: 1.5rem; }
        
        .employee-section { 
            background: #fff; border: 2px solid #e2e8f0; padding: 1.2rem; border-radius: 12px; margin-bottom: 1rem;
        }
        .employee-name { font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; color: #334155; display: flex; justify-content: space-between; }
        
        .pin-input {
            width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #cbd5e1; border-radius: 6px;
            text-align: center; font-size: 1.1rem; box-sizing: border-box; letter-spacing: 3px;
        }

        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        button { flex: 1; min-width: 80px; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; color: white; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        .btn-in { background-color: var(--success); }
        .btn-out { background-color: var(--danger); }
        .btn-leave { background-color: var(--warning); }
        .btn-ot { background-color: var(--ot); }

        .log-container { margin-top: 2rem; max-height: 400px; overflow-y: auto; border-top: 2px solid #e2e8f0; }
        .log-item { padding: 12px 5px; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }
        .log-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .note-text { color: #64748b; font-style: italic; background: #f8fafc; padding: 4px 8px; border-left: 3px solid #cbd5e1; margin-top: 5px; }
        
        .status-in { color: var(--success); font-weight: bold; }
        .status-out { color: var(--danger); font-weight: bold; }
        .status-leave { color: var(--warning); font-weight: bold; }
        .status-ot { color: var(--ot); font-weight: bold; }
        
        .footer-btns { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .export-btn { 
            background-color: var(--excel); color: white; border: none; padding: 10px 20px; 
            border-radius: 8px; font-size: 0.9rem; cursor: pointer; width: 100%;
        }
        .clear-btn { color: #94a3b8; background: none; border: none; cursor: pointer; text-decoration: underline; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>🕒 ระบบลงเวลา Jantra & Panwasa</h2>

    <div class="employee-section">
        <div class="employee-name">👤 Jantra <span>(PIN: 1234)</span></div>
        <input type="password" id="pin-jantra" class="pin-input" placeholder="กรอก PIN 4 หลัก" maxlength="4">
        <div class="btn-group">
            <button class="btn-in" onclick="handleAuth('jantra', 'เข้างาน', '1234', 'Jantra')">เข้างาน</button>
            <button class="btn-out" onclick="handleAuth('jantra', 'ออกงาน', '1234', 'Jantra')">ออกงาน</button>
            <button class="btn-ot" onclick="handleAuth('jantra', 'โอที', '1234', 'Jantra')">โอที</button>
            <button class="btn-leave" onclick="handleAuth('jantra', 'ลา', '1234', 'Jantra')">แจ้งลา</button>
        </div>
    </div>

    <div class="employee-section">
        <div class="employee-name">👤 Panwasa <span>(PIN: 5678)</span></div>
        <input type="password" id="pin-panwasa" class="pin-input" placeholder="กรอก PIN 4 หลัก" maxlength="4">
        <div class="btn-group">
            <button class="btn-in" onclick="handleAuth('panwasa', 'เข้างาน', '5678', 'Panwasa')">เข้างาน</button>
            <button class="btn-out" onclick="handleAuth('panwasa', 'ออกงาน', '5678', 'Panwasa')">ออกงาน</button>
            <button class="btn-ot" onclick="handleAuth('panwasa', 'โอที', '5678', 'Panwasa')">โอที</button>
            <button class="btn-leave" onclick="handleAuth('panwasa', 'ลา', '5678', 'Panwasa')">แจ้งลา</button>
        </div>
    </div>

    <div class="log-container" id="logContainer"></div>

    <div class="footer-btns">
        <button class="export-btn" onclick="exportToExcel()">📊 Export to Excel (.xlsx)</button>
        <button class="clear-btn" onclick="clearLogs()">ล้างประวัติทั้งหมด</button>
    </div>
</div>

<script>
    window.onload = displayLogs;

    function handleAuth(inputId, type, correctPin, fullName) {
        const inputElement = document.getElementById('pin-' + inputId.toLowerCase());
        const enteredPin = inputElement.value;

        if (enteredPin === correctPin) {
            let note = "";
            if (type === 'ลา') {
                note = prompt("สาเหตุการลา:");
                if (note === null) return;
            } else if (type === 'โอที') {
                const otType = confirm("ตกลง: เริ่มโอที | ยกเลิก: จบโอที") ? "เริ่ม" : "จบ";
                const job = prompt("งานที่ทำ:");
                note = `[${otType}] ${job || ""}`;
            }

            recordTime(fullName, type, note);
            inputElement.value = '';
        } else {
            alert('รหัส PIN ไม่ถูกต้อง!');
            inputElement.value = '';
        }
    }

    function recordTime(name, type, note) {
        const now = new Date();
        const dateStr = now.toLocaleDateString('th-TH');
        const timeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
        
        const entry = { 
            "ชื่อพนักงาน": name, 
            "ประเภท": type, 
            "วันที่": dateStr, 
            "เวลา": timeStr, 
            "หมายเหตุ": note || "-" 
        };
        
        let logs = JSON.parse(localStorage.getItem('staffLogs_v2')) || [];
        logs.unshift(entry);
        localStorage.setItem('staffLogs_v2', JSON.stringify(logs));
        displayLogs();
    }

    function displayLogs() {
        const logs = JSON.parse(localStorage.getItem('staffLogs_v2')) || [];
        const container = document.getElementById('logContainer');
        container.innerHTML = logs.length === 0 ? '<p style="text-align:center; color:#94a3b8; margin-top:20px;">ไม่มีข้อมูลบันทึก</p>' : '';

        logs.forEach(log => {
            let statusClass = `status-${log["ประเภท"] === 'เข้างาน' ? 'in' : log["ประเภท"] === 'ออกงาน' ? 'out' : log["ประเภท"] === 'ลา' ? 'leave' : 'ot'}`;
            container.innerHTML += `
                <div class="log-item">
                    <div class="log-header">
                        <span><strong>${log["ชื่อพนักงาน"]}</strong></span>
                        <span class="${statusClass}">${log["ประเภท"]}</span>
                        <span style="color: #64748b;">${log["วันที่"]} ${log["เวลา"]}</span>
                    </div>
                    ${log["หมายเหตุ"] !== "-" ? `<div class="note-text">📝 ${log["หมายเหตุ"]}</div>` : ''}
                </div>`;
        });
    }

    function exportToExcel() {
        const logs = JSON.parse(localStorage.getItem('staffLogs_v2')) || [];
        if (logs.length === 0) return alert('ไม่มีข้อมูลให้ส่งออก');

        // สร้าง Worksheet จากข้อมูล JSON
        const worksheet = XLSX.utils.json_to_sheet(logs);
        // สร้าง Workbook
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "WorkLogs");

        // ส่งออกไฟล์เป็นชื่อ work_logs.xlsx
        XLSX.writeFile(workbook, "work_logs_jantra_panwasa.xlsx");
    }

    function clearLogs() {
        if(confirm('ยืนยันลบข้อมูลทั้งหมด?')) {
            localStorage.removeItem('staffLogs_v2');
            displayLogs();
        }
    }
</script>

</body>
</html>
