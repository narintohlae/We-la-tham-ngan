<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Log - Personal History</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #0f172a; --border: #e2e8f0; --success: #10b981; --error: #ef4444; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 420px; padding: 20px; }
        .page { display: none; background: var(--card); padding: 24px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .page.active { display: block; }
        
        h1 { font-size: 1.25rem; font-weight: 600; text-align: center; margin-bottom: 8px; }
        .subtitle { color: #64748b; font-size: 0.85rem; text-align: center; margin-bottom: 20px; }
        
        .input-field { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 12px; text-align: center; font-size: 1.1rem; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; }

        .current-status-box { background: #f1f5f9; padding: 12px; border-radius: 12px; font-size: 0.85rem; text-align: center; margin-bottom: 20px; color: var(--primary); font-weight: 600; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .action-btn { background: white; border: 2px solid var(--border); padding: 15px 5px; border-radius: 16px; font-weight: 600; cursor: pointer; font-size: 0.85rem; }
        .action-btn:disabled { opacity: 0.3; cursor: not-allowed; border-style: dashed; }
        .action-btn:not(:disabled):hover { border-color: var(--primary); background: #f8fafc; }

        /* ส่วนแสดงประวัติ */
        .history-section { border-top: 1px solid var(--border); pt: 20px; margin-top: 10px; }
        .history-title { font-size: 0.9rem; font-weight: 600; margin: 15px 0 10px 0; color: var(--primary); }
        .history-list { font-size: 0.75rem; width: 100%; border-collapse: collapse; }
        .history-list tr { border-bottom: 1px solid #f1f5f9; }
        .history-list td { padding: 10px 5px; color: #475569; }
        .tag { padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
        .tag-in { background: #dcfce7; color: #166534; }
        .tag-out { background: #fee2e2; color: #991b1b; }
        .tag-leave { background: #fef3c7; color: #92400e; }

        .logout-link { display: block; text-align: center; margin-top: 25px; color: #ef4444; font-size: 0.8rem; cursor: pointer; background: none; border: none; width: 100%; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <div id="page-login" class="page">
        <h1>Cloud Login</h1>
        <p class="subtitle">ระบุ PIN เพื่อเข้าใช้งาน</p>
        <input type="password" id="login-pin" class="input-field" placeholder="PIN" maxlength="4">
        <button class="btn btn-main" onclick="handleLogin()">Sign In</button>
    </div>

    <div id="page-dashboard" class="page">
        <h1 id="welcome-text">Dashboard</h1>
        <div id="status-info" class="current-status-box">กำลังตรวจสอบสถานะ...</div>
        
        <div class="action-grid">
            <button id="btn-in" class="action-btn" onclick="record('เข้างาน')" style="color: var(--success)">Check In</button>
            <button id="btn-out" class="action-btn" onclick="record('ออกงาน')" style="color: var(--error)">Check Out</button>
        </div>
        <button id="btn-leave" class="btn" onclick="record('ลา')" style="background: #fef3c7; color: #92400e; font-size: 0.85rem;">แจ้งลา (Leave Request)</button>

        <div class="history-section">
            <p class="history-title">ประวัติ 5 รายการล่าสุด</p>
            <table class="history-list" id="history-table">
                <tbody id="history-body">
                    <tr><td colspan="3" style="text-align:center">ไม่พบข้อมูลประวัติ</td></tr>
                </tbody>
            </table>
        </div>

        <button class="logout-link" onclick="logout()">ออกจากระบบ (Logout)</button>
    </div>

    <div id="page-admin" class="page">
        <h1>Admin Control</h1>
        <button class="btn btn-main" style="background: #1d6f42;" onclick="exportFromFirestore()">📊 Export All Data to Excel</button>
        <button class="logout-link" style="color: #64748b" onclick="logout()">Back</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyD-RzkBZ3lXFodonqoMFIrpuCwQ4JPr71g",
      authDomain: "we-la-tham-ngan.firebaseapp.com",
      projectId: "we-la-tham-ngan",
      storageBucket: "we-la-tham-ngan.firebasestorage.app",
      messagingSenderId: "321115203647",
      appId: "1:321115203647:web:9d8d11ed78c4e949e3b08a",
      measurementId: "G-71P7D9NKJK"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const USERS = { "1234": "Jantra", "5678": "Panwasa", "9999": "Admin" };
    
    let currentUser = null;

    window.onload = function() {
        const savedUser = localStorage.getItem('activeUser');
        if (savedUser) {
            currentUser = savedUser;
            if (currentUser === 'Admin') showPage('page-admin');
            else {
                showPage('page-dashboard');
                document.getElementById('welcome-text').innerText = "สวัสดี, " + currentUser;
                refreshDashboard();
            }
        } else { showPage('page-login'); }
    };

    function handleLogin() {
        const pin = document.getElementById('login-pin').value;
        if (USERS[pin]) {
            currentUser = USERS[pin];
            localStorage.setItem('activeUser', currentUser);
            document.getElementById('login-pin').value = '';
            if (currentUser === 'Admin') showPage('page-admin');
            else {
                showPage('page-dashboard');
                document.getElementById('welcome-text').innerText = "สวัสดี, " + currentUser;
                refreshDashboard();
            }
        } else { alert('PIN ไม่ถูกต้อง'); }
    }

    async function refreshDashboard() {
        await checkLastStatus();
        await fetchHistory();
    }

    async function checkLastStatus() {
        const statusBox = document.getElementById('status-info');
        const btnIn = document.getElementById('btn-in');
        const btnOut = document.getElementById('btn-out');

        try {
            const snapshot = await db.collection("attendance_logs")
                .where("name", "==", currentUser)
                .orderBy("timestamp", "desc").limit(1).get();

            if (snapshot.empty) {
                statusBox.innerText = `สถานะล่าสุด: ยังไม่เริ่มงาน`;
                btnIn.disabled = false; btnOut.disabled = true;
            } else {
                const lastStatus = snapshot.docs[0].data().type;
                statusBox.innerText = `สถานะล่าสุด: ${lastStatus}`;
                btnIn.disabled = (lastStatus === "เข้างาน");
                btnOut.disabled = (lastStatus !== "เข้างาน");
            }
        } catch (e) { statusBox.innerText = "Error: กรุณาสร้าง Index"; }
    }

    async function fetchHistory() {
        const historyBody = document.getElementById('history-body');
        try {
            const snapshot = await db.collection("attendance_logs")
                .where("name", "==", currentUser)
                .orderBy("timestamp", "desc").limit(5).get();

            if (snapshot.empty) {
                historyBody.innerHTML = '<tr><td colspan="3" style="text-align:center">ไม่มีประวัติการทำงาน</td></tr>';
                return;
            }

            let html = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                const typeClass = data.type === 'เข้างาน' ? 'tag-in' : (data.type === 'ออกงาน' ? 'tag-out' : 'tag-leave');
                html += `
                    <tr>
                        <td style="font-weight:600">${data.date}</td>
                        <td>${data.time} น.</td>
                        <td style="text-align:right"><span class="tag ${typeClass}">${data.type}</span></td>
                    </tr>
                `;
            });
            historyBody.innerHTML = html;
        } catch (e) { console.error(e); }
    }

    function record(type) {
        let note = "-";
        if (type === 'ลา') note = prompt("ระบุสาเหตุการลา:") || "ไม่ระบุ";

        const entry = {
            name: currentUser, type: type, date: new Date().toLocaleDateString('th-TH'),
            time: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }),
            note: note, timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        db.collection("attendance_logs").add(entry).then(() => {
            alert(`บันทึกสำเร็จ!`);
            refreshDashboard(); 
        });
    }

    function logout() {
        if(confirm("ออกจากระบบใช่หรือไม่?")) {
            localStorage.removeItem('activeUser');
            location.reload();
        }
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function exportFromFirestore() {
        db.collection("attendance_logs").orderBy("timestamp", "desc").get().then((qs) => {
            const logs = [];
            qs.forEach(doc => logs.push(doc.data()));
            const ws = XLSX.utils.json_to_sheet(logs);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Attendance");
            XLSX.writeFile(wb, "Report.xlsx");
        });
    }
</script>
</body>
</html>
