<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Time Tracking - Fixed</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #0f172a; --border: #e2e8f0; --success: #10b981; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; padding: 20px; }
        .page { display: none; background: var(--card); padding: 32px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .page.active { display: block; }
        h1 { font-size: 1.25rem; font-weight: 600; text-align: center; margin-bottom: 8px; }
        .subtitle { color: #64748b; font-size: 0.85rem; text-align: center; margin-bottom: 24px; }
        .input-field { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 12px; text-align: center; font-size: 1.1rem; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 24px; }
        .action-btn { background: white; border: 1px solid var(--border); padding: 18px 10px; border-radius: 16px; font-weight: 600; cursor: pointer; }
        .logout-link { display: block; text-align: center; margin-top: 20px; color: #64748b; font-size: 0.8rem; cursor: pointer; background: none; border: none; width: 100%; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <div id="page-login" class="page active">
        <h1>Cloud Login</h1>
        <p class="subtitle">ระบุ PIN (1234, 5678, 9999)</p>
        <input type="password" id="login-pin" class="input-field" placeholder="PIN" maxlength="4">
        <button class="btn btn-main" onclick="handleLogin()">Sign In</button>
    </div>

    <div id="page-dashboard" class="page">
        <h1 id="welcome-text">Dashboard</h1>
        <div class="action-grid">
            <button class="action-btn" onclick="record('เข้างาน')" style="color: var(--success)">Check In</button>
            <button class="action-btn" onclick="record('ออกงาน')" style="color: #ef4444">Check Out</button>
            <button class="action-btn" onclick="record('โอที')" style="color: #6366f1">Overtime</button>
            <button class="action-btn" onclick="record('ลา')" style="color: #f59e0b">Leave</button>
        </div>
        <button class="logout-link" onclick="logout()">Logout</button>
    </div>

    <div id="page-admin" class="page">
        <h1>Admin Panel</h1>
        <button class="btn btn-main" style="background: #1d6f42;" onclick="exportFromFirebase()">📊 Export Excel</button>
        <button class="logout-link" onclick="logout()">Back</button>
    </div>
</div>

<script>
    // 🚩 ตรวจสอบ URL นี้ใน Firebase Console หน้า Realtime Database 
    // ถ้า URL ของคุณไม่ใช่ภูมิภาค US (เช่นเป็น asia-southeast1) ต้องใช้ URL เต็ม
    const firebaseConfig = {
      apiKey: "AIzaSyD-RzkBZ3lXFodonqoMFIrpuCwQ4JPr71g",
      authDomain: "we-la-tham-ngan.firebaseapp.com",
      projectId: "we-la-tham-ngan",
      storageBucket: "we-la-tham-ngan.firebasestorage.app",
      messagingSenderId: "321115203647",
      appId: "1:321115203647:web:9d8d11ed78c4e949e3b08a",
      measurementId: "G-71P7D9NKJK",
      // ปรับ URL ให้ตรงตามที่ Firebase มักจะสร้างให้โปรเจกต์ใหม่ในโซนเอเชีย
      databaseURL: "https://we-la-tham-ngan-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    try {
        firebase.initializeApp(firebaseConfig);
        console.log("Firebase Initialized");
    } catch (e) {
        alert("Firebase Config Error: " + e.message);
    }

    const db = firebase.database();
    const USERS = { "1234": "Jantra", "5678": "Panwasa", "9999": "Admin" };
    let currentUser = null;

    function handleLogin() {
        const pin = document.getElementById('login-pin').value;
        if (USERS[pin]) {
            currentUser = USERS[pin];
            document.getElementById('login-pin').value = '';
            showPage(currentUser === 'Admin' ? 'page-admin' : 'page-dashboard');
            if(currentUser !== 'Admin') document.getElementById('welcome-text').innerText = "Hello, " + currentUser;
        } else {
            alert('PIN ไม่ถูกต้อง');
        }
    }

    function record(type) {
        const entry = {
            name: currentUser,
            type: type,
            date: new Date().toLocaleDateString('th-TH'),
            time: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }),
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };

        console.log("Attempting to save:", entry);

        // ทดสอบส่งข้อมูลและดัก Error
        db.ref('attendance_logs').push(entry)
            .then(() => {
                alert('บันทึกสำเร็จ!');
                logout();
            })
            .catch((error) => {
                console.error("Firebase Error:", error);
                alert("เกิดข้อผิดพลาด: " + error.message + "\n\nกรุณาตรวจสอบหน้า Rules ใน Firebase Console");
            });
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function logout() { currentUser = null; showPage('page-login'); }

    function exportFromFirebase() {
        db.ref('attendance_logs').once('value').then((snapshot) => {
            const data = snapshot.val();
            if (!data) return alert('ไม่มีข้อมูล');
            const logs = Object.values(data).reverse();
            const ws = XLSX.utils.json_to_sheet(logs);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Attendance");
            XLSX.writeFile(wb, "Report.xlsx");
        });
    }
</script>
</body>
</html>
