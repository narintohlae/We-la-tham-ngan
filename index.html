<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTime Ultra - Admin Table View</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #6366f1; --bg: #0f172a; --surface: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1); --text-primary: #f8fafc;
            --success: #10b981; --danger: #f43f5e; --warning: #f59e0b;
        }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: var(--text-primary); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 600px; padding: 20px; }
        .glass-card { background: var(--surface); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 30px; padding: 25px; display: none; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .glass-card.active { display: block; }

        /* Table Styles */
        .table-container { width: 100%; overflow-x: auto; margin-top: 20px; border-radius: 15px; border: 1px solid var(--glass-border); }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 500px; }
        th { background: rgba(255,255,255,0.1); padding: 12px; text-align: left; color: var(--accent-light); font-weight: 800; }
        td { padding: 12px; border-bottom: 1px solid var(--glass-border); vertical-align: middle; }
        tr:hover { background: rgba(255,255,255,0.02); }

        /* Row Types */
        .row-late { color: var(--danger); background: rgba(244,63,94,0.05); }
        .row-on-time { color: var(--success); }
        .row-leave { color: var(--warning); font-style: italic; }

        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .badge-in { background: var(--success); color: #fff; }
        .badge-out { background: var(--danger); color: #fff; }

        .btn-pro { width: 100%; padding: 16px; border-radius: 20px; border: none; font-weight: 700; cursor: pointer; background: var(--accent); color: #fff; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div id="page-login" class="glass-card active">
        <h1 style="text-align:center">ProTime Access</h1>
        <input type="password" id="login-pin" style="width:100%; padding:20px; border-radius:20px; background:rgba(0,0,0,0.3); border:1px solid var(--glass-border); color:#fff; text-align:center; font-size:1.5rem; margin-bottom:20px" placeholder="PIN" maxlength="4">
        <button class="btn-pro" onclick="handleLogin()">Sign In</button>
    </div>

    <div id="page-admin" class="glass-card">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <h2 style="margin:0">Admin Control</h2>
            <button onclick="logout()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:700">Logout</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>พนักงาน</th>
                        <th>กิจกรรม</th>
                        <th>วันที่ / เวลา</th>
                        <th>สถานะ / ผลลัพธ์</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body">
                    </tbody>
            </table>
        </div>

        <button class="btn-pro" onclick="exportFromFirestore()">📊 Export to Excel (.xlsx)</button>
    </div>

    <div id="page-dashboard" class="glass-card">
        <h2 id="welcome-text">User</h2>
        <div style="display:flex; gap:10px; margin-bottom:20px">
            <button id="btn-in" onclick="record('เข้างาน')" style="flex:1; padding:20px; border-radius:15px; border:none; background:var(--success); color:#fff; font-weight:700">เข้างาน</button>
            <button id="btn-out" onclick="record('ออกงาน')" style="flex:1; padding:20px; border-radius:15px; border:none; background:var(--danger); color:#fff; font-weight:700">ออกงาน</button>
        </div>
        <div id="history-stack"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD-RzkBZ3lXFodonqoMFIrpuCwQ4JPr71g",
        authDomain: "we-la-tham-ngan.firebaseapp.com",
        projectId: "we-la-tham-ngan",
        storageBucket: "we-la-tham-ngan.firebasestorage.app",
        messagingSenderId: "321115203647",
        appId: "1:321115203647:web:9d8d11ed78c4e949e3b08a"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const USERS = { "1234": "Jantra", "5678": "Panwasa", "9999": "Admin" };
    let currentUser = null;

    window.onload = () => {
        const saved = localStorage.getItem('activeUser');
        if(saved) { currentUser = saved; entryPoint(); }
    };

    function handleLogin() {
        const pin = document.getElementById('login-pin').value;
        if(USERS[pin]) { currentUser = USERS[pin]; localStorage.setItem('activeUser', currentUser); entryPoint(); }
        else { alert("PIN ผิด"); }
    }

    function entryPoint() {
        document.querySelectorAll('.glass-card').forEach(c => c.classList.remove('active'));
        if(currentUser === 'Admin') { document.getElementById('page-admin').classList.add('active'); initAdmin(); }
        else { document.getElementById('page-dashboard').classList.add('active'); initStaff(); }
    }

    // ฟังก์ชันหลักสำหรับ Admin Table
    function initAdmin() {
        db.collection("attendance_logs").orderBy("timestamp", "desc").limit(50).onSnapshot(snap => {
            const tbody = document.getElementById('admin-table-body');
            let html = '';
            snap.forEach(doc => {
                const d = doc.data();
                const typeBadge = d.type === 'เข้างาน' ? 'badge-in' : 'badge-out';
                let statusText = '-';
                let rowClass = '';

                if(d.isLate) {
                    statusText = `สาย ${d.lateMin} นาที`;
                    rowClass = 'row-late';
                } else if(d.workHours) {
                    statusText = `รวม ${d.workHours} ชม.`;
                    rowClass = 'row-on-time';
                } else if(d.type === 'ลา') {
                    rowClass = 'row-leave';
                    statusText = 'แจ้งลา';
                }

                html += `
                    <tr class="${rowClass}">
                        <td><b>${d.name}</b></td>
                        <td><span class="badge ${typeBadge}">${d.type}</span></td>
                        <td>${d.date}<br><small>${d.time}</small></td>
                        <td><b>${statusText}</b></td>
                    </tr>`;
            });
            tbody.innerHTML = html;
        });
    }

    async function record(type) {
        // ... (Logic การคำนวณสายและชั่วโมงงานจากเวอร์ชันก่อนหน้า)
        const now = new Date();
        const entry = {
            name: currentUser, type: type, date: now.toLocaleDateString('th-TH'),
            time: now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', hour12: false }),
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            isLate: false, lateMin: 0 // ตัวอย่างค่าเริ่มต้น
        };
        await db.collection("attendance_logs").add(entry);
        initStaff();
    }

    function initStaff() { /* โหลดข้อมูลส่วนตัวพนักงาน */ }
    function logout() { localStorage.clear(); location.reload(); }
    
    function exportFromFirestore() {
        db.collection("attendance_logs").orderBy("timestamp", "desc").get().then(qs => {
            const data = qs.docs.map(d => d.data());
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Attendance");
            XLSX.writeFile(wb, "Staff_Table_Report.xlsx");
        });
    }
</script>
</body>
</html>
