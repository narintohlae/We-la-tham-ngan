<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Time Tracking - Locked Kiosk</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --primary: #3b82f6;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --excel: #059669;
            --border-light: #e5e7eb;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            
            /* 2. ป้องกันการเคาะหน้าจอ 2 ครั้งเพื่อซูม (CSS) */
            touch-action: pan-x pan-y;
            -webkit-text-size-adjust: 100%;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--bg-card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.04);
            transition: all 0.3s ease;
        }

        h1, h2, h3 { color: var(--text-main); text-align: center; margin-top: 0; font-weight: 600; }
        
        .clock-container { text-align: center; margin-bottom: 20px; }
        .clock-time { font-size: 3rem; font-weight: 600; color: var(--primary); letter-spacing: 2px; line-height: 1; }
        .clock-date { font-size: 1rem; color: var(--text-muted); margin-top: 8px; font-weight: 300; }
        
        .section-title { text-align: center; margin-bottom: 15px; color: var(--text-muted); font-size: 0.95em; font-weight: 400; }
        
        /* Employee Buttons */
        .employee-grid { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 20px; }
        .emp-btn {
            background-color: #f9fafb;
            color: var(--text-main);
            border: 1px solid var(--border-light);
            padding: 12px 24px;
            font-size: 1em;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Prompt', sans-serif;
            font-weight: 400;
            /* ป้องกันการคลุมดำข้อความบนปุ่ม */
            user-select: none;
            -webkit-user-select: none;
        }
        .emp-btn:hover { background-color: #f3f4f6; border-color: #d1d5db; }
        .emp-btn.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.25);
            transform: translateY(-2px);
            font-weight: 500;
        }

        /* Step 2 Container (Animation) */
        #step2-container { opacity: 1; transform: translateY(0); transition: opacity 0.4s ease, transform 0.4s ease; }
        #step2-container.hidden-step { opacity: 0; transform: translateY(20px); pointer-events: none; display: none; }

        /* PIN Dots Indicator */
        .pin-display { display: flex; justify-content: center; gap: 15px; margin: 20px 0 30px 0; transition: opacity 0.3s; }
        .pin-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #cbd5e1; background-color: transparent; transition: all 0.2s ease; }
        .pin-dot.filled { background-color: var(--primary); border-color: var(--primary); transform: scale(1.1); }

        /* Numpad */
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 280px; margin: 0 auto 30px auto; transition: opacity 0.3s; }
        .num-btn {
            background-color: #f9fafb; border: 1px solid var(--border-light); border-radius: 16px; padding: 18px 0;
            font-size: 1.5em; font-weight: 500; font-family: 'Prompt', sans-serif; color: var(--text-main);
            cursor: pointer; transition: all 0.1s ease; display: flex; align-items: center; justify-content: center;
            user-select: none; -webkit-user-select: none;
        }
        .num-btn:active { background-color: var(--border-light); transform: scale(0.95); }
        .num-btn-del { color: var(--danger); background-color: #fee2e2; border-color: #fca5a5; }

        /* Action Buttons (ถูกซ่อนไว้ตอนแรก) */
        .input-group { display: flex; gap: 15px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
        #action-buttons { opacity: 1; transform: translateY(0); transition: opacity 0.4s ease, transform 0.4s ease; }
        #action-buttons.hidden { opacity: 0; transform: translateY(20px); pointer-events: none; display: none !important; }
        
        .action-btn {
            padding: 18px 30px; font-size: 1.1em; border: none; border-radius: 16px; cursor: pointer; color: white;
            font-weight: 500; transition: all 0.2s; font-family: 'Prompt', sans-serif; flex: 1; max-width: 200px;
            display: flex; align-items: center; justify-content: center; gap: 8px; user-select: none; -webkit-user-select: none;
        }
        .btn-in { background-color: var(--success); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        .btn-in:hover { background-color: var(--success-hover); transform: translateY(-2px); }
        .btn-out { background-color: var(--danger); box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2); }
        .btn-out:hover { background-color: var(--danger-hover); transform: translateY(-2px); }
        
        .btn-text-link { background: none; border: none; color: var(--text-muted); cursor: pointer; font-family: 'Prompt', sans-serif; font-size: 0.9em; text-decoration: underline; padding: 10px; width: 100%; margin-top: 20px; transition: color 0.2s; }
        .btn-text-link:hover { color: var(--text-main); }
        .btn-add { background-color: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-family: 'Prompt'; }
        .btn-excel { background-color: var(--excel); color: white; width: 100%; margin-top: 10px; padding: 14px; border: none; border-radius: 12px; cursor: pointer; font-size: 1em; font-family: 'Prompt'; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* Admin Tables */
        .admin-section { border: 1px solid var(--border-light); padding: 25px; border-radius: 16px; margin-bottom: 24px; background: #fff; }
        .filters { display: flex; gap: 10px; background: #f9fafb; padding: 15px; border-radius: 12px; margin-bottom: 20px; flex-wrap: wrap; border: 1px solid var(--border-light);}
        input[type="text"], input[type="password"], input[type="date"] { font-family: 'Prompt', sans-serif; padding: 12px; font-size: 1em; border: 1px solid var(--border-light); border-radius: 8px; flex: 1; min-width: 150px; background-color: #f9fafb; outline: none; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 10px; font-size: 0.95em; }
        th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid var(--border-light); }
        th { color: var(--text-muted); font-weight: 500; font-size: 0.9em; text-transform: uppercase; border-bottom: 2px solid var(--border-light); }
        tr:last-child td { border-bottom: none; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 0.8em; font-weight: 500; }
        .status-in { background-color: #fef3c7; color: #d97706; }
        .status-out { background-color: #d1fae5; color: #059669; }
        
        .hidden { display: none !important; }
        .divider { height: 1px; background-color: var(--border-light); margin: 30px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="view-employee">
        <div class="clock-container">
            <div class="clock-time" id="clock-time">00:00</div>
            <div class="clock-date" id="clock-date">วันเดือนปี</div>
        </div>

        <div class="section-title">เลือกชื่อเพื่อบันทึกเวลา</div>
        <div id="employeeGrid" class="employee-grid">
            </div>

        <input type="hidden" id="empName" value="">

        <div id="step2-container" class="hidden-step">
            <div class="divider" style="margin: 20px 0;"></div>
            
            <div class="section-title" id="selected-emp-text" style="color: var(--primary); font-weight: 500; font-size: 1.1em;">
                ใส่รหัส PIN ของคุณ
            </div>

            <div class="pin-display" id="pin-display">
                <div class="pin-dot" id="dot-1"></div>
                <div class="pin-dot" id="dot-2"></div>
                <div class="pin-dot" id="dot-3"></div>
                <div class="pin-dot" id="dot-4"></div>
            </div>

            <div class="numpad" id="numpad">
                <button class="num-btn" onclick="pressNum('1')">1</button>
                <button class="num-btn" onclick="pressNum('2')">2</button>
                <button class="num-btn" onclick="pressNum('3')">3</button>
                <button class="num-btn" onclick="pressNum('4')">4</button>
                <button class="num-btn" onclick="pressNum('5')">5</button>
                <button class="num-btn" onclick="pressNum('6')">6</button>
                <button class="num-btn" onclick="pressNum('7')">7</button>
                <button class="num-btn" onclick="pressNum('8')">8</button>
                <button class="num-btn" onclick="pressNum('9')">9</button>
                <button class="num-btn num-btn-del" onclick="clearNum()">C</button>
                <button class="num-btn" onclick="pressNum('0')">0</button>
                <button class="num-btn num-btn-del" onclick="deleteNum()">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414 6.414a2 2 0 001.414.586H19a2 2 0 002-2V7a2 2 0 00-2-2h-8.172a2 2 0 00-1.414.586L3 12z"></path></svg>
                </button>
            </div>

            <div class="input-group hidden" id="action-buttons">
                <button class="action-btn btn-in" onclick="handleClock('in')">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg>
                    เข้างาน
                </button>
                <button class="action-btn btn-out" onclick="handleClock('out')">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    ออกงาน
                </button>
            </div>
        </div>

        <button class="btn-text-link" onclick="loginAdmin()">ผู้ดูแลระบบ (HR Dashboard) &rarr;</button>
    </div>

    <div id="view-admin" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">HR Dashboard</h2>
            <button class="btn-text-link" style="width: auto; margin: 0; padding: 0;" onclick="logoutAdmin()">&larr; กลับหน้าลงเวลา</button>
        </div>

        <div class="admin-section">
            <h3>จัดการพนักงาน</h3>
            <div class="input-group">
                <input type="text" id="newEmpName" placeholder="ชื่อพนักงาน">
                <input type="password" id="newEmpPin" placeholder="PIN (4 หลัก)" maxlength="4" style="letter-spacing: normal;">
                <button class="btn-add" onclick="addEmployee()">+ เพิ่มรายชื่อ</button>
            </div>
            <table>
                <thead><tr><th>ชื่อพนักงาน</th><th>รหัส PIN</th><th>การจัดการ</th></tr></thead>
                <tbody id="empTableBody"></tbody>
            </table>
        </div>

        <div class="admin-section">
            <h3>ประวัติการลงเวลา</h3>
            <div class="filters">
                <input type="text" id="searchName" placeholder="ค้นหาชื่อ..." oninput="renderRecords()">
                <input type="date" id="filterDate" onchange="renderRecords()">
                <button class="btn-add" style="background:#6b7280;" onclick="document.getElementById('searchName').value=''; document.getElementById('filterDate').value=''; renderRecords();">รีเซ็ต</button>
            </div>
            
            <button class="btn-excel" onclick="exportToCSV()">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                ดาวน์โหลด CSV
            </button>

            <table style="margin-top: 20px;">
                <thead>
                    <tr><th>วันที่</th><th>พนักงาน</th><th>เข้า</th><th>ออก</th><th>สถานะ</th></tr>
                </thead>
                <tbody id="recordTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- 3. JavaScript ป้องกันการซูมด้วยนิ้ว (Pinch-to-zoom) และเมาส์ (Ctrl+Scroll) ---
    document.addEventListener('touchstart', function(event) {
        if (event.touches.length > 1) {
            event.preventDefault(); // กันการใช้นิ้วถ่างจอ
        }
    }, { passive: false });

    let lastTouchEnd = 0;
    document.addEventListener('touchend', function(event) {
        let now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) {
            event.preventDefault(); // กันการเคาะเบิ้ล 2 ครั้ง (Double tap) สำหรับ iOS
        }
        lastTouchEnd = now;
    }, false);

    document.addEventListener('wheel', function(event) {
        if (event.ctrlKey) {
            event.preventDefault(); // กันการกด Ctrl + กลิ้งเมาส์ซูมบน PC
        }
    }, { passive: false });
    // -------------------------------------------------------------------------

    const ADMIN_PASSWORD = "admin"; 
    
    let records = JSON.parse(localStorage.getItem('timeRecords_v2')) || [];
    let employees = JSON.parse(localStorage.getItem('employees_v2')) || [];
    
    let currentPinCode = "";
    let isPinVerified = false;

    function saveData() {
        localStorage.setItem('timeRecords_v2', JSON.stringify(records));
        localStorage.setItem('employees_v2', JSON.stringify(employees));
    }

    // --- ระบบเวลา ---
    function updateClock() {
        const now = new Date();
        const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        
        document.getElementById('clock-time').innerText = now.toLocaleTimeString('th-TH', timeOptions);
        document.getElementById('clock-date').innerText = now.toLocaleDateString('th-TH', dateOptions);
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ================= สร้างปุ่มรายชื่อพนักงาน =================
    function renderEmployeeButtons() {
        const grid = document.getElementById('employeeGrid');
        if (employees.length === 0) {
            grid.innerHTML = '<span style="color:#ef4444; font-size: 0.9em;">ยังไม่มีข้อมูลพนักงาน กรุณาเพิ่มในระบบผู้ดูแล</span>';
            return;
        }
        grid.innerHTML = employees.map(emp => 
            `<button class="emp-btn" id="btn-emp-${emp.name}" onclick="selectEmployee('${emp.name}')">${emp.name}</button>`
        ).join('');
    }

    function selectEmployee(name) {
        document.getElementById('empName').value = name;
        
        document.getElementById('selected-emp-text').classList.remove('hidden');
        document.getElementById('pin-display').classList.remove('hidden');
        document.getElementById('numpad').classList.remove('hidden');
        document.getElementById('action-buttons').classList.add('hidden');
        
        document.querySelectorAll('.emp-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-emp-${name}`).classList.add('active');
        document.getElementById('selected-emp-text').innerText = `ใส่รหัส PIN ของคุณ: ${name}`;
        
        clearNum(); 
        document.getElementById('step2-container').classList.remove('hidden-step');
        
        setTimeout(() => {
            document.getElementById('step2-container').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 100);
    }

    renderEmployeeButtons();

    // ================= ระบบแป้นพิมพ์ & การตรวจสอบรหัส =================
    function updatePinDots() {
        for (let i = 1; i <= 4; i++) {
            const dot = document.getElementById(`dot-${i}`);
            dot.classList.remove('filled');
            if (i <= currentPinCode.length) {
                dot.classList.add('filled');
            }
        }
    }

    function pressNum(num) {
        if (isPinVerified || currentPinCode.length >= 4) return;
        currentPinCode += num;
        updatePinDots();

        if (currentPinCode.length === 4) {
            verifyPin();
        }
    }

    function deleteNum() {
        if (isPinVerified || currentPinCode.length === 0) return;
        currentPinCode = currentPinCode.slice(0, -1);
        updatePinDots();
    }

    function clearNum() {
        currentPinCode = "";
        isPinVerified = false;
        updatePinDots();
    }

    function verifyPin() {
        const name = document.getElementById('empName').value;
        const validEmp = employees.find(e => e.name === name && e.pin === currentPinCode);

        setTimeout(() => {
            if (validEmp) {
                isPinVerified = true;
                
                document.getElementById('selected-emp-text').classList.add('hidden');
                document.getElementById('pin-display').classList.add('hidden');
                document.getElementById('numpad').classList.add('hidden');
                
                document.getElementById('action-buttons').classList.remove('hidden');
            } else {
                alert('❌ รหัส PIN ไม่ถูกต้อง! กรุณาลองใหม่อีกครั้ง');
                clearNum();
            }
        }, 150); 
    }

    function resetToHome() {
        document.getElementById('step2-container').classList.add('hidden-step');
        document.getElementById('empName').value = ''; 
        
        document.getElementById('selected-emp-text').classList.remove('hidden');
        document.getElementById('pin-display').classList.remove('hidden');
        document.getElementById('numpad').classList.remove('hidden');
        document.getElementById('action-buttons').classList.add('hidden');

        clearNum();  
        document.querySelectorAll('.emp-btn').forEach(btn => btn.classList.remove('active'));
    }

    // ================= ส่วนของพนักงาน =================
    function handleClock(type) {
        const name = document.getElementById('empName').value;
        const activeRecordIndex = records.findIndex(r => r.name === name && !r.timeOut);
        const now = new Date().toISOString();

        if (type === 'in') {
            if (activeRecordIndex > -1) {
                resetToHome();
                return alert(`คุณ ${name} ได้บันทึกเข้างานไปแล้วครับ`);
            }
            records.push({ id: Date.now(), name: name, timeIn: now, timeOut: null });
            alert(`✅ บันทึกเวลาเข้างานสำเร็จ: ${name}`);
        } else if (type === 'out') {
            if (activeRecordIndex === -1) {
                resetToHome();
                return alert(`ไม่พบประวัติการเข้างานของคุณ ${name} ครับ`);
            }
            records[activeRecordIndex].timeOut = now;
            alert(`✅ บันทึกเวลาออกงานสำเร็จ: ${name}`);
        }

        saveData();
        resetToHome(); 
    }

    // ================= ส่วนของ Admin =================
    function loginAdmin() {
        const pass = prompt('รหัสผ่านผู้ดูแลระบบ:');
        if (pass === ADMIN_PASSWORD) {
            document.getElementById('view-employee').classList.add('hidden');
            document.getElementById('view-admin').classList.remove('hidden');
            renderEmployees();
            renderRecords();
        } else if (pass !== null) {
            alert('รหัสผ่านไม่ถูกต้อง');
        }
    }

    function logoutAdmin() {
        document.getElementById('view-admin').classList.add('hidden');
        document.getElementById('view-employee').classList.remove('hidden');
        resetToHome();
    }

    function addEmployee() {
        const name = document.getElementById('newEmpName').value.trim();
        const pin = document.getElementById('newEmpPin').value.trim();
        
        if (!name || pin.length !== 4) return alert('กรุณากรอกชื่อ และ PIN 4 หลัก');
        if (employees.find(e => e.name === name)) return alert('มีชื่อนี้ในระบบแล้ว');

        employees.push({ name, pin });
        saveData();
        renderEmployees();
        renderEmployeeButtons();
        document.getElementById('newEmpName').value = '';
        document.getElementById('newEmpPin').value = '';
    }

    function deleteEmployee(name) {
        if (confirm(`ลบข้อมูล ${name} หรือไม่?`)) {
            employees = employees.filter(e => e.name !== name);
            saveData();
            renderEmployees();
            renderEmployeeButtons();
        }
    }

    function renderEmployees() {
        const tbody = document.getElementById('empTableBody');
        tbody.innerHTML = employees.map(emp => `
            <tr>
                <td>${emp.name}</td>
                <td style="color:var(--text-muted); font-family:monospace;">***${emp.pin.slice(-1)}</td>
                <td><button class="btn-text-link" style="color:var(--danger); padding:0; text-align:left; width:auto; text-decoration:none;" onclick="deleteEmployee('${emp.name}')">ลบ</button></td>
            </tr>
        `).join('');
    }

    function renderRecords() {
        const searchText = document.getElementById('searchName').value.toLowerCase();
        const filterDate = document.getElementById('filterDate').value; 
        const tbody = document.getElementById('recordTableBody');
        
        const filteredRecords = records.filter(record => {
            const matchName = record.name.toLowerCase().includes(searchText);
            const recordDate = new Date(record.timeIn).toISOString().split('T')[0];
            const matchDate = filterDate ? recordDate === filterDate : true;
            return matchName && matchDate;
        }).reverse();

        tbody.innerHTML = filteredRecords.map(record => {
            const dateStr = new Date(record.timeIn).toLocaleDateString('th-TH', { month:'short', day:'numeric' });
            const timeInStr = new Date(record.timeIn).toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' });
            const timeOutStr = record.timeOut ? new Date(record.timeOut).toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' }) : '-';
            const status = record.timeOut 
                ? '<span class="status-badge status-out">ออกแล้ว</span>' 
                : '<span class="status-badge status-in">กำลังทำงาน</span>';

            return `<tr><td>${dateStr}</td><td><strong>${record.name}</strong></td><td>${timeInStr}</td><td>${timeOutStr}</td><td>${status}</td></tr>`;
        }).join('');
    }

    // ================= ดาวน์โหลด CSV =================
    function exportToCSV() {
        if (records.length === 0) return alert('ไม่มีข้อมูลประวัติการทำงาน');

        let csvContent = "\uFEFF"; 
        csvContent += "วันที่,ชื่อพนักงาน,เวลาเข้า,เวลาออก,ชั่วโมงทำงาน,สถานะ\n";

        records.forEach(record => {
            const dateStr = new Date(record.timeIn).toLocaleDateString('th-TH');
            const name = record.name;
            const timeInStr = new Date(record.timeIn).toLocaleTimeString('th-TH');
            const timeOutStr = record.timeOut ? new Date(record.timeOut).toLocaleTimeString('th-TH') : '-';
            
            let durationStr = '-';
            let status = 'กำลังทำงาน';
            
            if (record.timeOut) {
                const diff = new Date(record.timeOut) - new Date(record.timeIn);
                const hours = Math.floor(diff / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                durationStr = `${hours} ชม. ${minutes} นาที`;
                status = 'เสร็จสิ้น';
            }

            csvContent += `"${dateStr}","${name}","${timeInStr}","${timeOutStr}","${durationStr}","${status}"\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        const today = new Date().toISOString().split('T')[0];
        link.setAttribute("href", url);
        link.setAttribute("download", `Timesheet_${today}.csv`);
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
