<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกเวลาเข้า-ออกงาน</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --danger-color: #f44336;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 5px;
        }
        .clock {
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
            color: #555;
            margin-bottom: 30px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            font-size: 1em;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 12px 20px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            transition: opacity 0.3s;
        }
        button:hover {
            opacity: 0.8;
        }
        .btn-in { background-color: var(--primary-color); }
        .btn-out { background-color: var(--danger-color); }
        .btn-clear { background-color: #9e9e9e; float: right; margin-top: 20px; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f8f9fa;
            font-weight: 600;
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.85em;
            color: white;
        }
        .status-in { background-color: #ff9800; }
        .status-out { background-color: var(--primary-color); }
    </style>
</head>
<body>

<div class="container">
    <h1>ระบบบันทึกเวลาพนักงาน</h1>
    <div class="clock" id="realtime-clock">00:00:00</div>

    <div class="input-group">
        <input type="text" id="employeeName" placeholder="กรอกรหัส หรือ ชื่อ-นามสกุลพนักงาน">
        <button class="btn-in" onclick="clockIn()">📥 เข้างาน</button>
        <button class="btn-out" onclick="clockOut()">📤 ออกงาน</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ชื่อพนักงาน</th>
                <th>เวลาเข้า</th>
                <th>เวลาออก</th>
                <th>ชั่วโมงทำงาน</th>
                <th>สถานะ</th>
            </tr>
        </thead>
        <tbody id="recordTableBody">
            </tbody>
    </table>

    <button class="btn-clear" onclick="clearData()">🗑️ ล้างข้อมูลทั้งหมด</button>
</div>

<script>
    // --- ระบบเวลา Real-time ---
    function updateClock() {
        const now = new Date();
        document.getElementById('realtime-clock').innerText = now.toLocaleString('th-TH', { 
            dateStyle: 'full', 
            timeStyle: 'medium' 
        });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // --- ระบบจัดการข้อมูล (Local Storage) ---
    let records = JSON.parse(localStorage.getItem('timeRecords')) || [];

    function saveData() {
        localStorage.setItem('timeRecords', JSON.stringify(records));
    }

    // --- ฟังก์ชันเข้างาน ---
    function clockIn() {
        const name = document.getElementById('employeeName').value.trim();
        if (!name) return alert('กรุณากรอกชื่อพนักงานก่อนบันทึกครับ');

        // ตรวจสอบว่าพนักงานคนนี้มีการเข้างานที่ยังไม่ได้ออกหรือไม่
        const activeRecord = records.find(r => r.name === name && !r.timeOut);
        if (activeRecord) {
            return alert(`คุณ ${name} ได้บันทึกเข้างานไปแล้ว กรุณาบันทึกออกงานก่อนครับ`);
        }

        const now = new Date().toISOString();
        records.push({
            id: Date.now(),
            name: name,
            timeIn: now,
            timeOut: null
        });

        saveData();
        renderTable();
        document.getElementById('employeeName').value = ''; // ล้างช่อง input
        alert('บันทึกเวลาเข้างานสำเร็จ!');
    }

    // --- ฟังก์ชันออกงาน ---
    function clockOut() {
        const name = document.getElementById('employeeName').value.trim();
        if (!name) return alert('กรุณากรอกชื่อพนักงานก่อนบันทึกครับ');

        // หาบันทึกล่าสุดที่ยังไม่ได้ออกงาน
        const activeRecord = records.find(r => r.name === name && !r.timeOut);
        if (!activeRecord) {
            return alert(`ไม่พบประวัติการเข้างานของคุณ ${name} หรือคุณได้บันทึกออกงานไปแล้วครับ`);
        }

        activeRecord.timeOut = new Date().toISOString();
        saveData();
        renderTable();
        document.getElementById('employeeName').value = ''; // ล้างช่อง input
        alert('บันทึกเวลาออกงานสำเร็จ!');
    }

    // --- ฟังก์ชันล้างข้อมูล (สำหรับ Admin) ---
    function clearData() {
        if (confirm('คุณแน่ใจหรือไม่ว่าต้องการล้างข้อมูลประวัติทั้งหมด? (ไม่สามารถกู้คืนได้)')) {
            records = [];
            saveData();
            renderTable();
        }
    }

    // --- ฟังก์ชันคำนวณระยะเวลา ---
    function calculateDuration(start, end) {
        const diff = new Date(end) - new Date(start);
        const hours = Math.floor(diff / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        return `${hours} ชม. ${minutes} นาที`;
    }

    // --- ฟังก์ชันแสดงผลตาราง ---
    function renderTable() {
        const tbody = document.getElementById('recordTableBody');
        tbody.innerHTML = '';

        // เรียงข้อมูลจากใหม่ไปเก่า
        const sortedRecords = [...records].reverse();

        sortedRecords.forEach(record => {
            const tr = document.createElement('tr');
            
            const timeInStr = new Date(record.timeIn).toLocaleTimeString('th-TH');
            const timeOutStr = record.timeOut ? new Date(record.timeOut).toLocaleTimeString('th-TH') : '-';
            const durationStr = record.timeOut ? calculateDuration(record.timeIn, record.timeOut) : '-';
            const statusHtml = record.timeOut 
                ? '<span class="status-badge status-out">เสร็จสิ้น</span>' 
                : '<span class="status-badge status-in">กำลังทำงาน</span>';

            tr.innerHTML = `
                <td><strong>${record.name}</strong></td>
                <td>${timeInStr}</td>
                <td>${timeOutStr}</td>
                <td>${durationStr}</td>
                <td>${statusHtml}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // โหลดตารางครั้งแรกเมื่อเปิดเว็บ
    renderTable();
</script>

</body>
</html>
