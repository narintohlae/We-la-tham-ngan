<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกเวลาทำงานครบวงจร</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --warning: #f59e0b;
            --ot: #8b5cf6; /* สีม่วงสำหรับ OT */
            --bg: #f1f5f9;
        }
        body { font-family: 'Tahoma', sans-serif; background-color: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { text-align: center; color: #1e293b; margin-bottom: 1.5rem; }
        
        .employee-section { 
            background: #fff;
            border: 2px solid #e2e8f0; 
            padding: 1.2rem; 
            border-radius: 12px; 
            margin-bottom: 1rem;
        }
        .employee-name { font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; color: #334155; display: flex; justify-content: space-between; }
        
        .pin-input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            text-align: center;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        button { flex: 1; min-width: 100px; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; color: white; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        .btn-in { background-color: var(--success); }
        .btn-out { background-color: var(--danger); }
        .btn-leave { background-color: var(--warning); }
        .btn-ot { background-color: var(--ot); }

        .log-container { margin-top: 2rem; max-height: 450px; overflow-y: auto; border-top: 2px solid #e2e8f0; }
        .log-item { padding: 12px 5px; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }
        .log-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .note-text { color: #64748b; font-style: italic; background: #f8fafc; padding: 4px 8px; border-left: 3px solid #cbd5e1; margin-top: 5px; }
        
        /* สถานะสีต่างๆ */
        .status-in { color: var(--success); font-weight: bold; }
        .status-out { color: var(--danger); font-weight: bold; }
        .status-leave { color: var(--warning); font-weight: bold; }
        .status-ot { color: var(--ot); font-weight: bold; }
        
        .clear-btn { display: block; width: 100%; background: none; border: none; color: #94a3b8; cursor: pointer; margin-top: 15px; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2>🕒 ระบบลงเวลาและโอที</h2>

    <div class="employee-section">
        <div class="employee-name">👤 นายสมชาย <span>(PIN: 1111)</span></div>
        <input type="password" id="pin-somchai" class="pin-input" placeholder="กรอก PIN 4 หลัก" maxlength="4">
        <div class="btn-group">
            <button class="btn-in" onclick="handleAuth('somchai', 'เข้างาน', '1111', 'นายสมชาย')">เข้างาน</button>
            <button class="btn-out" onclick="handleAuth('somchai', 'ออกงาน', '1111', 'นายสมชาย')">ออกงาน</button>
            <button class="btn-ot" onclick="handleAuth('somchai', 'โอที', '1111', 'นายสมชาย')">ทำโอที</button>
            <button class="btn-leave" onclick="handleAuth('somchai', 'ลา', '1111', 'นายสมชาย')">แจ้งลา</button>
        </div>
    </div>

    <div class="employee-section">
        <div class="employee-name">👤 นางสาวสมหญิง <span>(PIN: 2222)</span></div>
        <input type="password" id="pin-somying" class="pin-input" placeholder="กรอก PIN 4 หลัก" maxlength="4">
        <div class="btn-group">
            <button class="btn-in" onclick="handleAuth('somying', 'เข้างาน', '2222', 'นางสาวสมหญิง')">เข้างาน</button>
            <button class="btn-out" onclick="handleAuth('somying', 'ออกงาน', '2222', 'นางสาวสมหญิง')">ออกงาน</button>
            <button class="btn-ot" onclick="handleAuth('somying', 'โอที', '2222', 'นางสาวสมหญิง')">ทำโอที</button>
            <button class="btn-leave" onclick="handleAuth('somying', 'ลา', '2222', 'นางสาวสมหญิง')">แจ้งลา</button>
        </div>
    </div>

    <div class="log-container" id="logContainer"></div>
    <button class="clear-btn" onclick="clearLogs()">ล้างข้อมูลทั้งหมด</button>
</div>

<script>
    window.onload = displayLogs;

    function handleAuth(inputId, type, correctPin, fullName) {
        const inputElement = document.getElementById('pin-' + inputId);
        const enteredPin = inputElement.value;

        if (enteredPin === correctPin) {
            let note = "";
            
            if (type === 'ลา') {
                note = prompt("ระบุประเภทการลา (ลาป่วย/ลากิจ):");
                if (note === null) return;
            } 
            else if (type === 'โอที') {
                const otAction = prompt("เลือกการทำงาน: พิมพ์ 'เริ่ม' เพื่อเริ่มโอที หรือ 'จบ' เพื่อจบโอที");
                if (otAction === null) return;
                
                const detail = prompt("ระบุรายละเอียดงานที่ทำ (ถ้ามี):");
                note = `[${otAction}] ${detail || ""}`;
            }

            recordTime(fullName, type, note);
            inputElement.value = '';
            alert('บันทึกสำเร็จ!');
        } else {
            alert('รหัส PIN ไม่ถูกต้อง!');
            inputElement.value = '';
        }
    }

    function recordTime(name, type, note) {
        const now = new Date();
        const dateStr = now.toLocaleDateString('th-TH');
        const timeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
        
        const entry = { name, type, time: `${dateStr} ${timeStr}`, note: note };
        let logs = JSON.parse(localStorage.getItem('fullWorkLogs')) || [];
        logs.unshift(entry);
        localStorage.setItem('fullWorkLogs', JSON.stringify(logs));
        displayLogs();
    }

    function displayLogs() {
        const logs = JSON.parse(localStorage.getItem('fullWorkLogs')) || [];
        const container = document.getElementById('logContainer');
        container.innerHTML = logs.length === 0 ? '<p style="text-align:center; color:#94a3b8; margin-top:20px;">ยังไม่มีประวัติ</p>' : '';

        logs.forEach(log => {
            let statusClass = 'status-in';
            if(log.type === 'ออกงาน') statusClass = 'status-out';
            else if(log.type === 'ลา') statusClass = 'status-leave';
            else if(log.type === 'โอที') statusClass = 'status-ot';

            let noteHtml = log.note ? `<div class="note-text">📝 ${log.note}</div>` : '';

            container.innerHTML += `
                <div class="log-item">
                    <div class="log-header">
                        <span><strong>${log.name}</strong></span>
                        <span class="${statusClass}">${log.type}</span>
                        <span style="color: #64748b;">${log.time}</span>
                    </div>
                    ${noteHtml}
                </div>
            `;
        });
    }

    function clearLogs() {
        if(confirm('ยืนยันการลบประวัติทั้งหมด?')) {
            localStorage.removeItem('fullWorkLogs');
            displayLogs();
        }
    }
</script>

</body>
</html>
