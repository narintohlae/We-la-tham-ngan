<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTime Ultra - Workspace Settings</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #6366f1; --bg: #0f172a; --surface: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1); --text-primary: #f8fafc;
            --success: #10b981; --danger: #f43f5e; --warning: #f59e0b;
        }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: var(--text-primary); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 480px; padding: 20px; }
        .glass-card { background: var(--surface); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 40px; padding: 30px; display: none; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .glass-card.active { display: block; }
        
        /* Settings Section */
        .settings-box { background: rgba(0,0,0,0.2); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--glass-border); }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .time-input { background: #1e293b; border: 1px solid var(--glass-border); color: #fff; padding: 8px; border-radius: 10px; font-family: inherit; }

        .btn-pro { width: 100%; padding: 16px; border-radius: 20px; border: none; font-weight: 700; cursor: pointer; background: var(--accent); color: #fff; margin-bottom: 10px; }
        .action-node { background: var(--surface); border: 1px solid var(--glass-border); border-radius: 25px; padding: 20px; color: #fff; cursor: pointer; width: 48%; }
        .feed-card { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 15px; margin-bottom: 10px; border: 1px solid var(--glass-border); font-size: 0.85rem; }
        .tag-late { background: rgba(244,63,94,0.2); color: var(--danger); padding: 2px 6px; border-radius: 6px; font-weight: 700; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="container">
    <div id="page-login" class="glass-card active">
        <h1 style="text-align:center">ProTime Access</h1>
        <input type="password" id="login-pin" style="width:100%; padding:20px; border-radius:20px; background:rgba(0,0,0,0.3); border:1px solid var(--glass-border); color:#fff; text-align:center; font-size:1.5rem; margin-bottom:20px" placeholder="PIN" maxlength="4">
        <button class="btn-pro" onclick="handleLogin()">Sign In</button>
    </div>

    <div id="page-dashboard" class="glass-card">
        <h2 id="welcome-text">User</h2>
        <div id="work-info" style="font-size: 0.8rem; color: var(--accent-light); margin-bottom: 15px;"></div>
        <div style="display:flex; justify-content:space-between; margin-bottom:20px">
            <button id="btn-in" class="action-node" onclick="record('เข้างาน')">📥 เข้างาน</button>
            <button id="btn-out" class="action-node" onclick="record('ออกงาน')">📤 ออกงาน</button>
        </div>
        <div id="history-stack"></div>
        <button onclick="logout()" class="logout-btn" style="background:none; border:none; color:#94a3b8; width:100%; cursor:pointer; margin-top:10px">Logout</button>
    </div>

    <div id="page-admin" class="glass-card">
        <h2>Admin Console</h2>
        
        <div class="settings-box">
            <h3 style="margin:0 0 15px 0; font-size:0.9rem; color:var(--accent-light)">⏱️ ตั้งค่าเวลาเข้า-ออกงาน</h3>
            <div class="setting-row">
                <span>เวลาเข้างาน (สายหลังจาก):</span>
                <input type="time" id="set-work-start" class="time-input" onchange="updateWorkSettings()">
            </div>
            <div class="setting-row">
                <span>เวลาออกงานมาตรฐาน:</span>
                <input type="time" id="set-work-end" class="time-input" onchange="updateWorkSettings()">
            </div>
            <small style="color:var(--text-secondary)">*ระบบจะบันทึกค่าอัตโนมัติเมื่อมีการเปลี่ยนแปลง</small>
        </div>

        <div id="admin-monitor" style="max-height:300px; overflow-y:auto; margin-bottom:20px"></div>
        <button class="btn-pro" onclick="exportFromFirestore()">📊 Export Full Report</button>
        <button onclick="logout()" style="background:none; border:none; color:#94a3b8; width:100%; cursor:pointer">Back</button>
    </div>
</div>

<script>
    // Firebase Config (คงเดิม)
    const firebaseConfig = {
        apiKey: "AIzaSyD-RzkBZ3lXFodonqoMFIrpuCwQ4JPr71g",
        authDomain: "we-la-tham-ngan.firebaseapp.com",
        projectId: "we-la-tham-ngan",
        storageBucket: "we-la-tham-ngan.firebasestorage.app",
        messagingSenderId: "321115203647",
        appId: "1:321115203647:web:9d8d11ed78c4e949e3b08a"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const USERS = { "1234": "Jantra", "5678": "Panwasa", "9999": "Admin" };
    
    // ตัวแปรเก็บเวลางาน (จะถูกทับด้วยค่าจาก DB)
    let config = { start: "09:00", end: "18:00" }; 

    window.onload = async () => {
        await loadSettings();
        const saved = localStorage.getItem('activeUser');
        if(saved) { currentUser = saved; entryPoint(); }
    };

    // โหลดการตั้งค่าจาก Firestore
    async function loadSettings() {
        const doc = await db.collection("settings").doc("work_config").get();
        if(doc.exists) {
            config = doc.data();
            if(document.getElementById('set-work-start')) {
                document.getElementById('set-work-start').value = config.start;
                document.getElementById('set-work-end').value = config.end;
            }
        }
    }

    // อัปเดตการตั้งค่า (เรียกโดย Admin)
    async function updateWorkSettings() {
        config.start = document.getElementById('set-work-start').value;
        config.end = document.getElementById('set-work-end').value;
        await db.collection("settings").doc("work_config").set(config);
        console.log("Settings Updated:", config);
    }

    function handleLogin() {
        const pin = document.getElementById('login-pin').value;
        if(USERS[pin]) { currentUser = USERS[pin]; localStorage.setItem('activeUser', currentUser); entryPoint(); }
        else { alert("PIN ผิด"); }
    }

    function entryPoint() {
        document.querySelectorAll('.glass-card').forEach(c => c.classList.remove('active'));
        if(currentUser === 'Admin') { 
            document.getElementById('page-admin').classList.add('active'); 
            loadSettings();
            initAdmin(); 
        } else { 
            document.getElementById('page-dashboard').classList.add('active'); 
            initStaff(); 
        }
    }

    async function initStaff() {
        document.getElementById('welcome-text').innerText = "สวัสดี, " + currentUser;
        document.getElementById('work-info').innerText = `เวลางานปกติ: ${config.start} - ${config.end}`;
        const snap = await db.collection("attendance_logs").where("name", "==", currentUser).orderBy("timestamp", "desc").limit(1).get();
        if(!snap.empty) {
            const last = snap.docs[0].data().type;
            document.getElementById('btn-in').disabled = (last === 'เข้างาน');
            document.getElementById('btn-out').disabled = (last !== 'เข้างาน');
        }
    }

    function initAdmin() {
        db.collection("attendance_logs").orderBy("timestamp", "desc").limit(20).onSnapshot(snap => {
            let html = '';
            snap.forEach(doc => {
                const d = doc.data();
                html += `<div class="feed-card">
                    <b>${d.name}</b> | ${d.type} <br>
                    <small>${d.date} ${d.time}</small>
                    ${d.isLate ? `<span class="tag-late">สาย ${d.lateMin} นาที</span>` : ''}
                </div>`;
            });
            document.getElementById('admin-monitor').innerHTML = html;
        });
    }

    async function record(type) {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', hour12: false });
        let isLate = false;
        let lateMin = 0;

        if(type === 'เข้างาน') {
            const [h, m] = timeStr.split(':').map(Number);
            const [sh, sm] = config.start.split(':').map(Number);
            if(h > sh || (h === sh && m > sm)) {
                isLate = true;
                lateMin = (h * 60 + m) - (sh * 60 + sm);
            }
        }

        const entry = {
            name: currentUser, type: type, date: now.toLocaleDateString('th-TH'),
            time: timeStr, isLate: isLate, lateMin: lateMin,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        await db.collection("attendance_logs").add(entry);
        initStaff();
    }

    function logout() { localStorage.clear(); location.reload(); }

    function exportFromFirestore() {
        db.collection("attendance_logs").orderBy("timestamp", "desc").get().then(qs => {
            const data = qs.docs.map(d => {
                const i = d.data();
                return { "พนักงาน": i.name, "กิจกรรม": i.type, "วันที่": i.date, "เวลา": i.time, "สาย(นาที)": i.lateMin || 0 };
            });
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Report");
            XLSX.writeFile(wb, "Staff_Report.xlsx");
        });
    }
</script>
</body>
</html>
