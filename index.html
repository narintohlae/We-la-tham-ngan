<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกเวลา + ระบบหลังบ้าน</title>
    <style>
        :root {
            --primary: #4CAF50;
            --danger: #f44336;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --bg: #f4f7f6;
            --excel: #217346;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1, h2 { color: var(--dark); text-align: center; margin-top: 0; }
        .clock { text-align: center; font-size: 1.8em; font-weight: bold; color: var(--primary); margin-bottom: 20px; }
        
        /* Form Inputs */
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; flex-wrap: wrap; }
        input { padding: 12px; font-size: 1em; border: 1px solid #ccc; border-radius: 5px; flex: 1; min-width: 150px; }
        input[type="password"] { text-align: center; letter-spacing: 2px; }
        
        /* Buttons */
        button { padding: 12px 20px; font-size: 1em; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        .btn-in { background-color: var(--primary); }
        .btn-out { background-color: var(--danger); }
        .btn-admin { background-color: var(--dark); width: 100%; margin-top: 20px; }
        .btn-logout { background-color: #7f8c8d; float: right; margin-bottom: 20px; }
        .btn-add { background-color: #2980b9; }
        .btn-excel { background-color: var(--excel); width: 100%; margin-top: 10px; font-size: 1.1em;}

        /* Tables */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.95em; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: var(--light); color: var(--dark); }
        .status-in { background-color: #f39c12; color: white; padding: 4px 8px; border-radius: 12px; font-size: 0.85em; }
        .status-out { background-color: var(--primary); color: white; padding: 4px 8px; border-radius: 12px; font-size: 0.85em; }

        /* Dashboard Layout */
        .admin-section { border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px; background: #fafafa; }
        .hidden { display: none !important; }
        .filters { display: flex; gap: 10px; background: var(--light); padding: 15px; border-radius: 5px; margin-bottom: 15px; flex-wrap: wrap;}
    </style>
</head>
<body>

<div class="container">
    <div id="view-employee">
        <h1>ระบบบันทึกเวลาเข้า-ออกงาน</h1>
        <div class="clock" id="realtime-clock">00:00:00</div>

        <div class="input-group">
            <input type="text" id="empName" placeholder="ชื่อพนักงาน (เช่น สมชาย)">
            <input type="password" id="empPin" placeholder="รหัส PIN 4 หลัก" maxlength="4">
        </div>
        <div class="input-group">
            <button class="btn-in" onclick="handleClock('in')">📥 เข้างาน</button>
            <button class="btn-out" onclick="handleClock('out')">📤 ออกงาน</button>
        </div>

        <button class="btn-admin" onclick="loginAdmin()">⚙️ เข้าสู่ระบบจัดการหลังบ้าน (HR)</button>
    </div>

    <div id="view-admin" class="hidden">
        <button class="btn-logout" onclick="logoutAdmin()">🚪 ออกจากระบบหลังบ้าน</button>
        <h2>📊 แดชบอร์ดจัดการหลังบ้าน</h2>

        <div class="admin-section">
            <h3>👥 จัดการรหัสพนักงาน (ตั้งค่า PIN)</h3>
            <div class="input-group">
                <input type="text" id="newEmpName" placeholder="ชื่อพนักงานใหม่">
                <input type="password" id="newEmpPin" placeholder="ตั้งรหัส PIN 4 หลัก" maxlength="4">
                <button class="btn-add" onclick="addEmployee()">➕ เพิ่มพนักงาน</button>
            </div>
            <table>
                <thead><tr><th>ชื่อพนักงาน</th><th>รหัส PIN</th><th>จัดการ</th></tr></thead>
                <tbody id="empTableBody"></tbody>
            </table>
        </div>

        <div class="admin-section">
            <h3>ประวัติการลงเวลาทั้งหมด</h3>
            <div class="filters">
                <input type="text" id="searchName" placeholder="🔍 ค้นหาชื่อพนักงาน..." oninput="renderRecords()">
                <input type="date" id="filterDate" onchange="renderRecords()">
                <button class="btn-out" onclick="document.getElementById('searchName').value=''; document.getElementById('filterDate').value=''; renderRecords();">ล้างตัวกรอง</button>
            </div>
            
            <button class="btn-excel" onclick="exportToCSV()">📥 ดาวน์โหลดข้อมูลเป็น Excel (CSV)</button>

            <table>
                <thead>
                    <tr><th>วันที่</th><th>ชื่อพนักงาน</th><th>เวลาเข้า</th><th>เวลาออก</th><th>สถานะ</th></tr>
                </thead>
                <tbody id="recordTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const ADMIN_PASSWORD = "admin"; 
    
    let records = JSON.parse(localStorage.getItem('timeRecords_v2')) || [];
    let employees = JSON.parse(localStorage.getItem('employees_v2')) || [];

    function saveData() {
        localStorage.setItem('timeRecords_v2', JSON.stringify(records));
        localStorage.setItem('employees_v2', JSON.stringify(employees));
    }

    // --- ระบบเวลา Real-time ---
    setInterval(() => {
        document.getElementById('realtime-clock').innerText = new Date().toLocaleString('th-TH', { dateStyle: 'full', timeStyle: 'medium' });
    }, 1000);

    // ================= ส่วนของพนักงาน =================
    function handleClock(type) {
        const name = document.getElementById('empName').value.trim();
        const pin = document.getElementById('empPin').value.trim();

        if (!name || !pin) return alert('กรุณากรอกชื่อและรหัส PIN ให้ครบถ้วนครับ');

        const validEmp = employees.find(e => e.name === name && e.pin === pin);
        if (!validEmp) return alert('❌ ชื่อหรือรหัส PIN ไม่ถูกต้อง! (หากยังไม่มีชื่อ ให้ติดต่อ HR)');

        const activeRecordIndex = records.findIndex(r => r.name === name && !r.timeOut);
        const now = new Date().toISOString();

        if (type === 'in') {
            if (activeRecordIndex > -1) return alert('คุณได้บันทึกเข้างานไปแล้วครับ');
            records.push({ id: Date.now(), name: name, timeIn: now, timeOut: null });
            alert('✅ บันทึกเวลาเข้างานสำเร็จ!');
        } else if (type === 'out') {
            if (activeRecordIndex === -1) return alert('ไม่พบประวัติการเข้างานของคุณครับ');
            records[activeRecordIndex].timeOut = now;
            alert('✅ บันทึกเวลาออกงานสำเร็จ!');
        }

        saveData();
        document.getElementById('empName').value = '';
        document.getElementById('empPin').value = '';
    }

    // ================= ส่วนของ Admin =================
    function loginAdmin() {
        const pass = prompt('กรุณาใส่รหัสผ่านผู้ดูแลระบบ (ค่าเริ่มต้นคือ: admin)');
        if (pass === ADMIN_PASSWORD) {
            document.getElementById('view-employee').classList.add('hidden');
            document.getElementById('view-admin').classList.remove('hidden');
            renderEmployees();
            renderRecords();
        } else if (pass !== null) {
            alert('❌ รหัสผ่านไม่ถูกต้อง');
        }
    }

    function logoutAdmin() {
        document.getElementById('view-admin').classList.add('hidden');
        document.getElementById('view-employee').classList.remove('hidden');
    }

    function addEmployee() {
        const name = document.getElementById('newEmpName').value.trim();
        const pin = document.getElementById('newEmpPin').value.trim();
        
        if (!name || pin.length !== 4) return alert('กรุณากรอกชื่อ และตั้งรหัส PIN ให้ครบ 4 หลักครับ');
        if (employees.find(e => e.name === name)) return alert('มีชื่อพนักงานคนนี้ในระบบแล้ว');

        employees.push({ name, pin });
        saveData();
        renderEmployees();
        document.getElementById('newEmpName').value = '';
        document.getElementById('newEmpPin').value = '';
    }

    function deleteEmployee(name) {
        if (confirm(`ลบข้อมูลคุณ ${name} ออกจากระบบ?`)) {
            employees = employees.filter(e => e.name !== name);
            saveData();
            renderEmployees();
        }
    }

    function renderEmployees() {
        const tbody = document.getElementById('empTableBody');
        tbody.innerHTML = employees.map(emp => `
            <tr>
                <td>${emp.name}</td>
                <td>***${emp.pin.slice(-1)} (ซ่อน)</td>
                <td><button class="btn-out" onclick="deleteEmployee('${emp.name}')">ลบ</button></td>
            </tr>
        `).join('');
    }

    function renderRecords() {
        const searchText = document.getElementById('searchName').value.toLowerCase();
        const filterDate = document.getElementById('filterDate').value; 
        const tbody = document.getElementById('recordTableBody');
        
        const filteredRecords = records.filter(record => {
            const matchName = record.name.toLowerCase().includes(searchText);
            const recordDate = new Date(record.timeIn).toISOString().split('T')[0];
            const matchDate = filterDate ? recordDate === filterDate : true;
            return matchName && matchDate;
        }).reverse();

        tbody.innerHTML = filteredRecords.map(record => {
            const dateStr = new Date(record.timeIn).toLocaleDateString('th-TH');
            const timeInStr = new Date(record.timeIn).toLocaleTimeString('th-TH');
            const timeOutStr = record.timeOut ? new Date(record.timeOut).toLocaleTimeString('th-TH') : '-';
            const status = record.timeOut 
                ? '<span class="status-out">ออกแล้ว</span>' 
                : '<span class="status-in">กำลังทำงาน</span>';

            return `<tr><td>${dateStr}</td><td><strong>${record.name}</strong></td><td>${timeInStr}</td><td>${timeOutStr}</td><td>${status}</td></tr>`;
        }).join('');
    }

    // ================= ระบบดาวน์โหลดไฟล์ Excel (CSV) =================
    function exportToCSV() {
        if (records.length === 0) {
            return alert('ยังไม่มีข้อมูลประวัติการทำงานในระบบครับ');
        }

        // \uFEFF คือ BOM เพื่อให้ Excel อ่านภาษาไทยเป็น UTF-8 ได้ถูกต้อง
        let csvContent = "\uFEFF"; 
        
        // สร้างหัวตาราง (Header)
        csvContent += "วันที่,ชื่อพนักงาน,เวลาเข้า,เวลาออก,ชั่วโมงทำงาน,สถานะ\n";

        // วนลูปข้อมูลทั้งหมดเพื่อใส่ในแต่ละแถว
        records.forEach(record => {
            const dateStr = new Date(record.timeIn).toLocaleDateString('th-TH');
            const name = record.name;
            const timeInStr = new Date(record.timeIn).toLocaleTimeString('th-TH');
            const timeOutStr = record.timeOut ? new Date(record.timeOut).toLocaleTimeString('th-TH') : '-';
            
            let durationStr = '-';
            let status = 'กำลังทำงาน';
            
            // คำนวณชั่วโมงทำงานถ้าพนักงานกดออกงานแล้ว
            if (record.timeOut) {
                const diff = new Date(record.timeOut) - new Date(record.timeIn);
                const hours = Math.floor(diff / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                durationStr = `${hours} ชม. ${minutes} นาที`;
                status = 'เสร็จสิ้น';
            }

            // นำข้อมูลมาต่อกันโดยมีลูกน้ำ (,) คั่น
            csvContent += `"${dateStr}","${name}","${timeInStr}","${timeOutStr}","${durationStr}","${status}"\n`;
        });

        // สร้างไฟล์และสั่งดาวน์โหลด
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        
        // ตั้งชื่อไฟล์พร้อมวันที่ปัจจุบัน
        const today = new Date().toISOString().split('T')[0];
        link.setAttribute("href", url);
        link.setAttribute("download", `ประวัติลงเวลา_${today}.csv`);
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
