<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTime Salary & Analytics</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #6366f1; --bg: #0f172a; --surface: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1); --text-primary: #f8fafc;
            --success: #10b981; --danger: #f43f5e; --warning: #f59e0b;
        }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: var(--text-primary); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 480px; padding: 20px; }
        .glass-card { background: var(--surface); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 40px; padding: 30px; display: none; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .glass-card.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .action-node { background: var(--surface); border: 1px solid var(--glass-border); border-radius: 25px; padding: 20px; color: #fff; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .action-node:disabled { opacity: 0.2; cursor: not-allowed; }
        
        .feed-card { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 15px; margin-bottom: 10px; border: 1px solid var(--glass-border); font-size: 0.85rem; }
        .tag { padding: 4px 8px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; margin-left: 5px; }
        .tag-late { background: rgba(244,63,94,0.2); color: var(--danger); }
        .tag-time { background: rgba(16,185,129,0.2); color: var(--success); }

        .admin-stat { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 15px; text-align: center; border: 1px solid var(--glass-border); }
        .btn-pro { width: 100%; padding: 16px; border-radius: 20px; border: none; font-weight: 700; cursor: pointer; background: var(--accent); color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div id="page-login" class="glass-card active">
        <h1 style="text-align:center">ProTime Access</h1>
        <input type="password" id="login-pin" style="width:100%; padding:20px; border-radius:20px; background:rgba(0,0,0,0.3); border:1px solid var(--glass-border); color:#fff; text-align:center; font-size:1.5rem; margin-bottom:20px" placeholder="PIN" maxlength="4">
        <button class="btn-pro" onclick="handleLogin()">เข้าสู่ระบบ</button>
    </div>

    <div id="page-dashboard" class="glass-card">
        <h2 id="welcome-text">Dashboard</h2>
        <div id="status-tag" style="color:var(--accent-light); font-weight:700; margin-bottom:10px">สถานะ: กำลังตรวจสอบ...</div>
        <div class="btn-grid">
            <button id="btn-in" class="action-node" onclick="record('เข้างาน')">📥 เข้างาน</button>
            <button id="btn-out" class="action-node" onclick="record('ออกงาน')">📤 ออกงาน</button>
        </div>
        <div id="history-stack"></div>
        <button onclick="logout()" style="background:none; border:none; color:#94a3b8; width:100%; margin-top:20px; cursor:pointer">ออกจากระบบ</button>
    </div>

    <div id="page-admin" class="glass-card">
        <h2>Admin Monitoring</h2>
        <div class="admin-stat">
            <div class="stat-box"><small>มาวันนี้</small><br><b id="stat-active">0</b></div>
            <div class="stat-box"><small>สายวันนี้</small><br><b id="stat-late" style="color:var(--danger)">0</b></div>
            <div class="stat-box"><small>ลาวันนี้</small><br><b id="stat-leave">0</b></div>
        </div>
        <div id="admin-monitor" style="max-height:350px; overflow-y:auto; margin-bottom:20px"></div>
        <button class="btn-pro" onclick="exportFromFirestore()">📊 Export Excel (สรุปชั่วโมงงาน)</button>
        <button onclick="logout()" style="background:none; border:none; color:#94a3b8; width:100%; margin-top:20px; cursor:pointer">กลับหน้าแรก</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD-RzkBZ3lXFodonqoMFIrpuCwQ4JPr71g",
        authDomain: "we-la-tham-ngan.firebaseapp.com",
        projectId: "we-la-tham-ngan",
        storageBucket: "we-la-tham-ngan.firebasestorage.app",
        messagingSenderId: "321115203647",
        appId: "1:321115203647:web:9d8d11ed78c4e949e3b08a"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const USERS = { "1234": "Jantra", "5678": "Panwasa", "9999": "Admin" };
    const WORK_START = "09:00"; // เวลางานเริ่ม
    let currentUser = null;

    window.onload = () => {
        const saved = localStorage.getItem('activeUser');
        if(saved) { currentUser = saved; entryPoint(); }
    };

    function handleLogin() {
        const pin = document.getElementById('login-pin').value;
        if(USERS[pin]) { currentUser = USERS[pin]; localStorage.setItem('activeUser', currentUser); entryPoint(); }
        else { alert("PIN ผิด"); }
    }

    function entryPoint() {
        document.getElementById('page-login').classList.remove('active');
        if(currentUser === 'Admin') { document.getElementById('page-admin').classList.add('active'); initAdmin(); }
        else { document.getElementById('page-dashboard').classList.add('active'); initStaff(); }
    }

    async function initStaff() {
        document.getElementById('welcome-text').innerText = "สวัสดี, " + currentUser;
        const snap = await db.collection("attendance_logs").where("name", "==", currentUser).orderBy("timestamp", "desc").limit(1).get();
        if(!snap.empty) {
            const last = snap.docs[0].data().type;
            document.getElementById('btn-in').disabled = (last === 'เข้างาน');
            document.getElementById('btn-out').disabled = (last !== 'เข้างาน');
            document.getElementById('status-tag').innerText = "สถานะล่าสุด: " + last;
        }
    }

    function initAdmin() {
        const today = new Date().toLocaleDateString('th-TH');
        db.collection("attendance_logs").orderBy("timestamp", "desc").limit(30).onSnapshot(snap => {
            let html = '';
            let active = new Set();
            let lateCount = 0;
            snap.forEach(doc => {
                const d = doc.data();
                if(d.date === today && d.type === 'เข้างาน') active.add(d.name);
                if(d.date === today && d.isLate) lateCount++;
                
                html += `<div class="feed-card">
                    <b>${d.name}</b> | ${d.type} <br>
                    <small>${d.date} ${d.time}</small>
                    ${d.isLate ? `<span class="tag tag-late">สาย ${d.lateMin} นาที</span>` : ''}
                    ${d.workHours ? `<br><small style="color:var(--success)">ทำงานไป: ${d.workHours} ชม.</small>` : ''}
                </div>`;
            });
            document.getElementById('admin-monitor').innerHTML = html;
            document.getElementById('stat-active').innerText = active.size;
            document.getElementById('stat-late').innerText = lateCount;
        });
    }

    async function record(type) {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', hour12: false });
        let isLate = false;
        let lateMin = 0;
        let workHours = null;

        if(type === 'เข้างาน') {
            const [h, m] = timeStr.split(':').map(Number);
            const [sh, sm] = WORK_START.split(':').map(Number);
            if(h > sh || (h === sh && m > sm)) {
                isLate = true;
                lateMin = (h * 60 + m) - (sh * 60 + sm);
            }
        }

        if(type === 'ออกงาน') {
            const lastIn = await db.collection("attendance_logs")
                .where("name", "==", currentUser).where("type", "==", "เข้างาน")
                .orderBy("timestamp", "desc").limit(1).get();
            if(!lastIn.empty) {
                const inTime = lastIn.docs[0].data().timestamp.toDate();
                const diffMs = now - inTime;
                workHours = (diffMs / (1000 * 60 * 60)).toFixed(2); // คำนวณชั่วโมงทศนิยม
            }
        }

        const entry = {
            name: currentUser, type: type, date: now.toLocaleDateString('th-TH'),
            time: timeStr, isLate: isLate, lateMin: lateMin, workHours: workHours,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        await db.collection("attendance_logs").add(entry);
        if(currentUser !== 'Admin') initStaff();
    }

    function logout() { localStorage.clear(); location.reload(); }

    function exportFromFirestore() {
        db.collection("attendance_logs").orderBy("timestamp", "desc").get().then(qs => {
            const data = qs.docs.map(d => {
                const i = d.data();
                return { 
                    "พนักงาน": i.name, "กิจกรรม": i.type, "วันที่": i.date, "เวลา": i.time,
                    "มาสาย(นาที)": i.lateMin || 0, "ชั่วโมงทำงานสุทธิ": i.workHours || "-"
                };
            });
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Salary_Report");
            XLSX.writeFile(wb, "Staff_Salary_Report.xlsx");
        });
    }
</script>
</body>
</html>
