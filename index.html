<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTime Admin - Real-time</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --bg: #f8fafc; --surface: #ffffff;
            --text-main: #1e293b; --text-sub: #64748b;
            --success: #10b981; --danger: #ef4444; --border: #e2e8f0;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; color: var(--text-main); }
        .container { width: 100%; max-width: 500px; margin: auto; padding: 20px; }

        .page { display: none; background: var(--surface); padding: 24px; border-radius: 30px; border: 1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Admin Dashboard Styles */
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card { background: #f1f5f9; padding: 15px; border-radius: 20px; text-align: center; }
        .stat-card div:first-child { font-size: 0.75rem; color: var(--text-sub); font-weight: 600; }
        .stat-card div:last-child { font-size: 1.5rem; font-weight: 700; color: var(--primary); }

        .search-box { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; outline: none; font-family: inherit; }

        .live-table-wrap { overflow-x: auto; margin-top: 10px; }
        .live-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .live-table th { text-align: left; padding: 10px; border-bottom: 2px solid var(--border); color: var(--text-sub); }
        .live-table td { padding: 12px 10px; border-bottom: 1px solid var(--border); }

        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; }
        .badge-in { background: #dcfce7; color: #166534; }
        .badge-out { background: #fee2e2; color: #991b1b; }
        .badge-leave { background: #fef3c7; color: #92400e; }

        .btn { width: 100%; padding: 14px; border-radius: 15px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-excel { background: #1d6f42; color: white; margin-top: 15px; }
        .logout-link { display: block; text-align: center; margin-top: 20px; color: var(--text-sub); font-size: 0.8rem; cursor: pointer; text-decoration: underline; background: none; border: none; width: 100%; }

        /* Login & Dashboard Styles (ย่อส่วนจากของเดิม) */
        .input-field { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 15px; text-align: center; font-size: 1.2rem; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .action-btn { background: #fff; border: 1px solid var(--border); padding: 20px; border-radius: 20px; cursor: pointer; font-weight: 700; }
        .action-btn:disabled { opacity: 0.3; }
    </style>
</head>
<body>

<div class="container">
    <div id="page-login" class="page">
        <h2 style="text-align:center">ProTime Cloud</h2>
        <input type="password" id="login-pin" class="input-field" placeholder="กรอกรหัส PIN" maxlength="4">
        <button class="btn" style="background:var(--primary); color:white" onclick="handleLogin()">Sign In</button>
    </div>

    <div id="page-dashboard" class="page">
        <h2 id="welcome-text">Dashboard</h2>
        <div id="status-info" style="text-align:center; margin-bottom:20px; font-weight:600; color:var(--primary)">กำลังโหลด...</div>
        <div class="action-grid">
            <button id="btn-in" class="action-btn" onclick="record('เข้างาน')" style="color:var(--success)">Check In</button>
            <button id="btn-out" class="action-btn" onclick="record('ออกงาน')" style="color:var(--danger)">Check Out</button>
        </div>
        <button class="btn" style="background:#f1f5f9" onclick="record('ลา')">แจ้งลาหยุด</button>
        <button class="logout-link" onclick="logout()">Logout</button>
    </div>

    <div id="page-admin" class="page">
        <div class="admin-header">
            <h2 style="margin:0">Admin Panel</h2>
            <button onclick="logout()" style="border:none; background:none; color:var(--danger); font-weight:600; cursor:pointer">Exit</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div>เข้างานแล้ว (วันนี้)</div>
                <div id="stat-active">0</div>
            </div>
            <div class="stat-card">
                <div>แจ้งลา (วันนี้)</div>
                <div id="stat-leave">0</div>
            </div>
        </div>

        <input type="text" id="admin-search" class="search-box" placeholder="ค้นหาชื่อพนักงาน..." onkeyup="filterTable()">

        <div style="font-weight:700; font-size:0.9rem; margin-bottom:10px">Live Activity Monitor</div>
        <div class="live-table-wrap">
            <table class="live-table">
                <thead>
                    <tr>
                        <th>พนักงาน</th>
                        <th>กิจกรรม</th>
                        <th>เวลา</th>
                    </tr>
                </thead>
                <tbody id="admin-live-body">
                    </tbody>
            </table>
        </div>

        <button class="btn btn-excel" onclick="exportFromFirestore()">📊 Export Excel Report</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD-RzkBZ3lXFodonqoMFIrpuCwQ4JPr71g",
        authDomain: "we-la-tham-ngan.firebaseapp.com",
        projectId: "we-la-tham-ngan",
        storageBucket: "we-la-tham-ngan.firebasestorage.app",
        messagingSenderId: "321115203647",
        appId: "1:321115203647:web:9d8d11ed78c4e949e3b08a",
        measurementId: "G-71P7D9NKJK"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const USERS = { "1234": "Jantra", "5678": "Panwasa", "9999": "Admin" };
    let currentUser = null;
    let unsubscribeAdmin = null; // สำหรับยกเลิกการฟังข้อมูลแบบ Real-time

    window.onload = function() {
        const saved = localStorage.getItem('activeUser');
        if (saved) { currentUser = saved; showPage(currentUser === 'Admin' ? 'page-admin' : 'page-dashboard'); initApp(); }
        else { showPage('page-login'); }
    };

    function handleLogin() {
        const pin = document.getElementById('login-pin').value;
        if (USERS[pin]) {
            currentUser = USERS[pin];
            localStorage.setItem('activeUser', currentUser);
            showPage(currentUser === 'Admin' ? 'page-admin' : 'page-dashboard');
            initApp();
        } else { alert('PIN ไม่ถูกต้อง'); }
    }

    function initApp() {
        if (currentUser === 'Admin') { startAdminMonitor(); } 
        else { document.getElementById('welcome-text').innerText = "Hi, " + currentUser; refreshStaffStatus(); }
    }

    // --- ส่วน Admin Real-time Logic ---
    function startAdminMonitor() {
        const today = new Date().toLocaleDateString('th-TH');
        
        // ฟังข้อมูลแบบ Real-time (onSnapshot)
        unsubscribeAdmin = db.collection("attendance_logs")
            .orderBy("timestamp", "desc")
            .limit(20)
            .onSnapshot((snapshot) => {
                const body = document.getElementById('admin-live-body');
                let html = '';
                let activeToday = new Set();
                let leaveToday = 0;

                snapshot.forEach(doc => {
                    const d = doc.data();
                    const badgeClass = d.type === 'เข้างาน' ? 'badge-in' : (d.type === 'ออกงาน' ? 'badge-out' : 'badge-leave');
                    
                    // สรุปยอดสถิติเฉพาะของวันนี้
                    if(d.date === today) {
                        if(d.type === 'เข้างาน') activeToday.add(d.name);
                        if(d.type === 'ลา') leaveToday++;
                    }

                    html += `
                        <tr class="log-row">
                            <td style="font-weight:600">${d.name}</td>
                            <td><span class="badge ${badgeClass}">${d.type}</span></td>
                            <td style="color:var(--text-sub)">${d.time}</td>
                        </tr>`;
                });

                body.innerHTML = html;
                document.getElementById('stat-active').innerText = activeToday.size;
                document.getElementById('stat-leave').innerText = leaveToday;
            });
    }

    function filterTable() {
        const input = document.getElementById('admin-search').value.toLowerCase();
        const rows = document.getElementsByClassName('log-row');
        Array.from(rows).forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(input) ? '' : 'none';
        });
    }

    // --- ส่วน Staff Logic ---
    async function refreshStaffStatus() {
        const snap = await db.collection("attendance_logs").where("name", "==", currentUser).orderBy("timestamp", "desc").limit(1).get();
        const statusBox = document.getElementById('status-info');
        if (snap.empty) { statusBox.innerText = "สถานะ: พร้อมเข้างาน"; }
        else {
            const last = snap.docs[0].data().type;
            statusBox.innerText = "สถานะล่าสุด: " + last;
            document.getElementById('btn-in').disabled = (last === 'เข้างาน');
            document.getElementById('btn-out').disabled = (last !== 'เข้างาน');
        }
    }

    function record(type) {
        const entry = {
            name: currentUser, type: type, 
            date: new Date().toLocaleDateString('th-TH'),
            time: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }),
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };
        db.collection("attendance_logs").add(entry).then(() => { if(currentUser !== 'Admin') refreshStaffStatus(); });
    }

    function logout() {
        if(unsubscribeAdmin) unsubscribeAdmin(); // หยุดดึงข้อมูล Real-time
        localStorage.removeItem('activeUser');
        location.reload();
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function exportFromFirestore() {
        db.collection("attendance_logs").orderBy("timestamp", "desc").get().then((qs) => {
            const logs = qs.docs.map(doc => doc.data());
            const ws = XLSX.utils.json_to_sheet(logs);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Report");
            XLSX.writeFile(wb, "Staff_Report_Admin.xlsx");
        });
    }
</script>
</body>
</html>
